<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MEOコンシェルジュ — デモ</title>
<style>
:root {
  --green: #1a7a4a;
  --green-dark: #145f3a;
  --green-light: #f0f7f3;
  --green-mid: rgba(26,122,74,.15);
  --bg-chat: #f2f4f6;
  --white: #ffffff;
  --text: #1c1c1e;
  --text-mid: #6e6e73;
  --border: #e4e4e8;
  --radius: 18px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: #d8dde3;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ---- モーダル ---- */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5); backdrop-filter: blur(8px);
  display: flex; justify-content: center; align-items: center; z-index: 200;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: white; border-radius: 20px; padding: 36px 32px;
  width: 90%; max-width: 400px;
  box-shadow: 0 24px 64px rgba(0,0,0,.25);
}
.modal-icon {
  width: 52px; height: 52px; background: var(--green-light);
  border-radius: 14px; display: flex; align-items: center; justify-content: center;
  margin-bottom: 18px;
}
.modal-icon svg { width: 26px; height: 26px; }
.modal h2 { font-size: 17px; font-weight: 800; margin-bottom: 6px; color: var(--text); }
.modal p { font-size: 13px; color: var(--text-mid); margin-bottom: 20px; line-height: 1.65; }
.modal input {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 14px; margin-bottom: 12px; outline: none;
  transition: border-color .15s; font-family: inherit; color: var(--text);
}
.modal input:focus { border-color: var(--green); }
.modal-btn {
  width: 100%; padding: 13px; background: var(--green); color: white;
  border: none; border-radius: 10px; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: opacity .15s; font-family: inherit;
}
.modal-btn:hover { opacity: .88; }
.modal-note { font-size: 11px; color: var(--text-mid); margin-top: 10px; text-align: center; }
.modal-note a { color: var(--green); text-decoration: none; }
.modal-service-link { margin-top: 10px; text-align: center; }
.modal-service-link a { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-mid); text-decoration: none; transition: color .15s; }
.modal-service-link a:hover { color: var(--green); }

/* ---- チャットコンテナ ---- */
.container {
  width: 100%; max-width: 460px; height: 100svh;
  display: flex; flex-direction: column; background: var(--bg-chat);
  box-shadow: 0 0 60px rgba(0,0,0,.2);
  overflow: hidden;
}

/* ---- ヘッダー ---- */
.header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.bot-avatar {
  width: 38px; height: 38px; border-radius: 12px;
  background: linear-gradient(135deg, #1a7a4a, #2eb872);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.bot-avatar svg { width: 22px; height: 22px; }
.header-name {
  font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2;
  display: flex; align-items: center; gap: 6px;
}
.online-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #34c759;
  display: inline-block; flex-shrink: 0;
}
.header-sub { font-size: 11px; color: var(--text-mid); margin-top: 1px; }
.header-demo-badge {
  background: var(--green-light); color: var(--green);
  border: 1px solid rgba(26,122,74,.2);
  border-radius: 6px; padding: 2px 8px; font-size: 10px; font-weight: 700;
  letter-spacing: .04em;
}
.header-actions { display: flex; align-items: center; gap: 4px; }
.header-icon-btn {
  width: 34px; height: 34px; border-radius: 8px; border: none;
  background: none; cursor: pointer; display: flex; align-items: center;
  justify-content: center; color: var(--text-mid); transition: background .15s;
  text-decoration: none;
}
.header-icon-btn:hover { background: var(--green-light); color: var(--green); }
.header-icon-btn svg { width: 18px; height: 18px; }

/* ---- メッセージエリア ---- */
.messages {
  flex: 1; overflow-y: auto; padding: 16px 14px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 2px; }

.msg { display: flex; gap: 8px; align-items: flex-end; }
.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px; border-radius: 10px;
  background: linear-gradient(135deg, #1a7a4a, #2eb872);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.msg-avatar svg { width: 17px; height: 17px; }

.bubble-wrap { display: flex; flex-direction: column; max-width: 80%; }
.msg.user .bubble-wrap { align-items: flex-end; }

.bubble {
  padding: 10px 14px; line-height: 1.65; font-size: 13.5px;
  white-space: pre-wrap; word-break: break-word;
}
.msg.bot .bubble {
  background: var(--white); color: var(--text);
  border-radius: 16px 16px 16px 4px;
  box-shadow: 0 1px 4px rgba(0,0,0,.07);
}
.msg.user .bubble {
  background: var(--green); color: white;
  border-radius: 16px 16px 4px 16px;
}
.msg.loading .bubble { color: var(--text-mid); font-style: italic; }

.bubble img.photo-preview {
  max-width: 200px; max-height: 160px;
  border-radius: 10px; display: block; margin-bottom: 4px;
  object-fit: cover;
}

.tool-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.tool-chip {
  font-size: 10px; background: var(--green-light); color: var(--green);
  border: 1px solid rgba(26,122,74,.2); border-radius: 100px; padding: 2px 8px;
  font-weight: 600;
}
.timestamp { font-size: 10px; color: var(--text-mid); margin-top: 4px; }

.date-divider {
  align-self: center; font-size: 11px; color: var(--text-mid);
  background: rgba(0,0,0,.07); border-radius: 100px;
  padding: 3px 12px;
}

/* ---- クイックボタン ---- */
.quick-btns-wrap {
  background: var(--white); border-top: 1px solid var(--border);
  display: flex; align-items: center; flex-shrink: 0;
}
.quick-btns {
  flex: 1; padding: 8px 10px 8px 14px;
  display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none;
}
.quick-btns::-webkit-scrollbar { display: none; }
.quick-btn {
  white-space: nowrap; padding: 6px 14px;
  border: 1.5px solid var(--border); color: var(--text-mid);
  border-radius: 100px; font-size: 12px; cursor: pointer;
  background: var(--white); flex-shrink: 0;
  transition: border-color .15s, color .15s, background .15s;
  font-family: inherit;
}
.quick-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
.scroll-arrow {
  flex-shrink: 0; width: 26px; height: 26px; margin-right: 8px;
  background: none; border: 1px solid var(--border); border-radius: 50%;
  font-size: 13px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; color: var(--text-mid);
  transition: all .15s;
}
.scroll-arrow:hover { border-color: var(--green); color: var(--green); }

/* ---- 入力エリア ---- */
.input-area {
  padding: 10px 14px 14px; background: var(--white);
  border-top: 1px solid var(--border);
  display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0;
}
.photo-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--white);
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-mid); transition: all .15s;
}
.photo-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
.photo-btn svg { width: 17px; height: 17px; }
#photoFileInput { display: none; }
.input-area textarea {
  flex: 1; padding: 9px 14px;
  border: 1.5px solid var(--border); border-radius: 20px;
  font-size: 14px; outline: none; resize: none;
  max-height: 96px; line-height: 1.5; font-family: inherit;
  color: var(--text); background: var(--bg-chat);
  transition: border-color .15s;
}
.input-area textarea:focus { border-color: var(--green); background: white; }
.send-btn {
  width: 38px; height: 38px; background: var(--green); color: white;
  border: none; border-radius: 50%; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .15s;
}
.send-btn svg { width: 16px; height: 16px; }
.send-btn:disabled { background: var(--border); cursor: default; }
.send-btn:not(:disabled):hover { opacity: .85; }
</style>
</head>
<body>

<!-- チャット画面 -->
<div class="container">

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-left">
      <div class="bot-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="8" width="18" height="12" rx="3"/>
          <circle cx="9" cy="14" r="1.5" fill="white" stroke="none"/>
          <circle cx="15" cy="14" r="1.5" fill="white" stroke="none"/>
          <path d="M8 8V6a4 4 0 0 1 8 0v2"/>
          <line x1="12" y1="3" x2="12" y2="4"/>
        </svg>
      </div>
      <div class="header-info">
        <div class="header-name">
          MEOコンシェルジュ
          <span class="online-dot"></span>
        </div>
        <div class="header-sub">焼肉 大将 ・ デモモード</div>
      </div>
      <span class="header-demo-badge">DEMO</span>
    </div>
    <div class="header-actions">
      <a href="https://agt-lp.taskra.jp/" target="_blank"
         class="header-icon-btn" title="サービスサイトを見る">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 8l4 4-4 4M8 12h8"/>
        </svg>
      </a>
    </div>
  </div>

  <!-- メッセージ -->
  <div class="messages" id="messages">
    <div class="date-divider">今日</div>
  </div>

  <!-- クイックボタン -->
  <div class="quick-btns-wrap">
    <button class="scroll-arrow" onclick="scrollQuickBtns(-1)" style="margin-left:8px;margin-right:0;">&#8249;</button>
    <div class="quick-btns" id="quickBtns">
      <button class="quick-btn" onclick="sendQuick('未返信の口コミを見せて')">📬 未返信口コミ</button>
      <button class="quick-btn" onclick="sendQuick('最近の投稿状況は？')">📝 投稿状況</button>
      <button class="quick-btn" onclick="sendQuick('先月のアクセスデータを教えて')">📊 データ確認</button>
      <button class="quick-btn" onclick="sendQuick('投稿案を3つ作って')">✍️ 投稿案</button>
      <button class="quick-btn" onclick="triggerPhotoUpload()">📸 写真を送る</button>
      <button class="quick-btn" onclick="sendQuick('苦情口コミへの返信文を作って')">⚠️ 苦情対応</button>
      <button class="quick-btn" onclick="sendQuick('店舗情報を変更したい')">✏️ 店舗情報変更</button>
      <button class="quick-btn" onclick="sendQuick('キーワード順位を教えて')">📍 キーワード順位</button>
      <button class="quick-btn" onclick="sendQuick('今月の月次レポートをまとめて')">📋 月次レポート</button>
      <button class="quick-btn" onclick="sendQuick('AI画像を生成して投稿したい')">🎨 AI画像生成</button>
    </div>
    <button class="scroll-arrow" onclick="scrollQuickBtns(1)" style="margin-right:8px;">&#8250;</button>
  </div>

  <!-- 入力 -->
  <div class="input-area">
    <button class="photo-btn" onclick="triggerPhotoUpload()" title="写真を送る">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </button>
    <input type="file" id="photoFileInput" accept="image/*" onchange="handlePhotoSelected(event)">
    <textarea id="msgInput" placeholder="メッセージを入力..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ============================================================
// モックデータ
// ============================================================
const STORE = {
  name: '焼肉 大将',
  address: '東京都渋谷区渋谷2-10-3 渋谷グランベルビル2F',
  category: '焼肉店',
  phone: '03-1234-5678',
  hours: '月〜木 11:00〜23:00 / 金土 11:00〜24:00 / 日 10:00〜22:00',
  holiday: 'なし（年中無休）',
  url: 'https://yakiniku-taisho.example.com',
  description: '厳選和牛を使用した本格焼肉店。個室完備で接待・記念日にも最適。',
  photo_count: 12,
};

const MOCK_REVIEWS = [
  { id: 'review-001', reviewer: '田中 太郎', stars: 5, comment: 'お肉が柔らかくてとても美味しかったです！スタッフの方も親切で、また来ます。', replied: false },
  { id: 'review-002', reviewer: '佐藤 花子', stars: 4, comment: 'コスパが良く満足しています。少し煙が気になりました。', replied: false },
  { id: 'review-003', reviewer: '山田 次郎', stars: 2, comment: '注文してから30分以上待たされました。改善をお願いします。', replied: false },
];
let reviews = MOCK_REVIEWS.map(r => ({...r}));

function daysAgo(n) { const d = new Date(); d.setDate(d.getDate() - n); return d.toISOString().slice(0,10); }
let posts = [{ id: 'post-001', text: '【週末限定】黒毛和牛カルビが10%オフ！この機会をお見逃しなく🔥', date: daysAgo(35), status: 'published' }];

// ============================================================
// Tools
// ============================================================
const TOOLS = [
  { name: 'get_gbp_stats', description: 'GBPの集客データを取得します。', input_schema: { type: 'object', properties: {}, required: [] } },
  { name: 'get_unanswered_reviews', description: '未返信の口コミ一覧を取得します。', input_schema: { type: 'object', properties: {}, required: [] } },
  { name: 'reply_to_review', description: '口コミに返信を投稿します。', input_schema: { type: 'object', properties: { review_id: { type: 'string' }, reply_text: { type: 'string' } }, required: ['review_id', 'reply_text'] } },
  { name: 'create_gbp_post', description: 'GBPに投稿を公開します。', input_schema: { type: 'object', properties: { text: { type: 'string' } }, required: ['text'] } },
  { name: 'get_posts_history', description: '過去のGBP投稿一覧を取得します。', input_schema: { type: 'object', properties: { limit: { type: 'integer' } }, required: [] } },
  { name: 'generate_post_draft', description: '投稿案を複数生成します。', input_schema: { type: 'object', properties: { theme: { type: 'string' }, count: { type: 'integer' } }, required: [] } },
  { name: 'generate_review_reply', description: '口コミへの返信文を生成します。', input_schema: { type: 'object', properties: { review_id: { type: 'string' } }, required: ['review_id'] } },
  { name: 'upload_photo_to_gbp', description: '写真をGBPにアップロードします。カテゴリ: FOOD/INTERIOR/EXTERIOR/TEAM', input_schema: { type: 'object', properties: { category: { type: 'string' }, caption: { type: 'string' } }, required: ['category'] } },
  { name: 'get_store_info', description: '現在のGBP店舗情報を取得します。', input_schema: { type: 'object', properties: {}, required: [] } },
  { name: 'update_store_info', description: 'GBPの店舗情報を更新します。フィールド: address/category/phone/hours/holiday/url/description', input_schema: { type: 'object', properties: { field: { type: 'string' }, value: { type: 'string' } }, required: ['field','value'] } },
  { name: 'get_keyword_rankings', description: '登録キーワードのGoogleマップ順位を取得します。', input_schema: { type: 'object', properties: {}, required: [] } },
  { name: 'get_monthly_report', description: '月次レポートを生成します。', input_schema: { type: 'object', properties: { month: { type: 'string' } }, required: [] } },
];

function executeTool(name, input) {
  if (name === 'get_gbp_stats') return { period: '直近30日', search_impressions: 1240, map_impressions: 830, website_clicks: 95, direction_requests: 42, phone_calls: 18, photo_views: 3200 };
  if (name === 'get_unanswered_reviews') return reviews.filter(r => !r.replied).map(r => ({ review_id: r.id, reviewer: r.reviewer, stars: r.stars, comment: r.comment }));
  if (name === 'reply_to_review') { const r = reviews.find(r => r.id === input.review_id); if (r) { r.replied = true; r.reply_text = input.reply_text; } return { success: true, message: '返信を投稿しました（モック）' }; }
  if (name === 'create_gbp_post') { const p = { id: 'post-' + String(posts.length+1).padStart(3,'0'), text: input.text, date: new Date().toISOString().slice(0,10), status: 'published' }; posts.push(p); return { success: true, post_id: p.id, message: '投稿を公開しました（モック）' }; }
  if (name === 'get_posts_history') { const sorted = [...posts].sort((a,b) => b.date.localeCompare(a.date)); const last = sorted[0]?.date; const days = last ? Math.floor((Date.now()-new Date(last))/86400000) : null; return { posts: sorted.slice(0, input.limit||10), last_post_at: last, days_since_last_post: days }; }
  if (name === 'generate_post_draft') { const theme = input.theme||'お店の魅力'; const count = input.count||3; return { drafts: ['【'+theme+'】焼肉 大将では、黒毛和牛をリーズナブルにご提供しています🐄 ご家族・ご友人との特別なひとときに、ぜひお越しください！', '🔥 '+theme+'キャンペーン開催中！期間限定でドリンク1杯無料サービス中。詳しくはお店にお問い合わせください。', '✨ '+theme+'にぴったりのコースをご用意しました。ご予約はお電話またはWeb予約で承ります。', '🌟 当店自慢の熟成肉とともに、素敵なひとときをお過ごしください！'].slice(0, count) }; }
  if (name === 'generate_review_reply') { const r = reviews.find(r => r.id === input.review_id); if (!r) return { error: '見つかりません' }; let reply; if (r.stars >= 4) reply = 'この度は温かいご口コミをいただき、誠にありがとうございます！'+r.reviewer+'様にまたお越しいただけることを、スタッフ一同心よりお待ちしております🙏'; else if (r.stars <= 2) reply = 'この度はご不満をおかけし、大変申し訳ございませんでした。'+r.reviewer+'様のご意見を真摯に受け止め、改善に努めてまいります。またの機会にぜひお試しいただけますと幸いです。'; else reply = 'ご来店いただき、誠にありがとうございます。'+r.reviewer+'様のご意見はスタッフ一同の励みとなっております。またのお越しを心よりお待ちしております。'; return { review_id: input.review_id, suggested_reply: reply }; }
  if (name === 'upload_photo_to_gbp') { STORE.photo_count += 1; return { success: true, message: '写真をGBPにアップロードしました（モック）', category: input.category, photo_count: STORE.photo_count }; }
  if (name === 'get_store_info') return { ...STORE };
  if (name === 'update_store_info') { if (input.field in STORE) { STORE[input.field] = input.value; return { success: true, field: input.field, new_value: input.value, message: 'GBPの店舗情報を更新しました（モック）' }; } return { success: false, error: '不明なフィールド' }; }
  if (name === 'get_keyword_rankings') return { keywords: [{ keyword: '焼肉 渋谷', rank: 3, prev_rank: 5, trend: '↑' }, { keyword: '焼肉 個室 渋谷', rank: 1, prev_rank: 1, trend: '→' }, { keyword: '和牛 渋谷', rank: 7, prev_rank: 6, trend: '↓' }, { keyword: '焼肉 渋谷 デート', rank: 4, prev_rank: 8, trend: '↑' }], measured_at: new Date().toISOString().slice(0,10) };
  if (name === 'get_monthly_report') return { month: input.month || '直近30日', search_impressions: 1240, map_impressions: 830, website_clicks: 95, direction_requests: 42, phone_calls: 18, photo_views: 3200, review_count: 12, avg_rating: 4.2, top_keyword: '焼肉 渋谷（3位）', action_plan: ['週1回以上の投稿を維持する', '苦情口コミへの返信を24時間以内に行う', '写真を月2枚以上追加する'] };
  return { error: '未知のツール: ' + name };
}

// ============================================================
// Claude API
// ============================================================
const SYSTEM_PROMPT = `あなたは「MEOコンシェルジュ」です。
店舗オーナーのLINEの相棒として、Google ビジネスプロフィール（GBP）の管理を全面的にサポートします。

担当店舗: 焼肉 大将（焼肉店）

## できること
- 口コミ返信の生成・投稿
- GBP投稿の提案・公開
- 集客データ（インサイト）の分析
- 写真のGBPへのアップロード（カテゴリ: FOOD/INTERIOR/EXTERIOR/TEAM）
- 店舗情報の変更（住所・業種・電話・営業時間・定休日・紹介文・URL）
- キーワード検索順位の確認
- 月次レポートの生成
- AI画像生成の提案（DALL-E 3）

## 写真受信時の対応
ユーザーが写真を送ってきたら:
1. 写真の内容を一言コメント（料理・内観・外観・スタッフなどを判断）
2. GBPのカテゴリを提案（FOOD/INTERIOR/EXTERIOR/TEAM）
3. 「このカテゴリでGBPに追加しますか？」と確認
4. 承認されたら upload_photo_to_gbp ツールを呼んでアップロード完了を報告

## 店舗情報変更の対応
1. 変更したい項目を確認
2. get_store_info で現在値を取得して提示
3. 新しい値を確認
4. 「GBPに反映しますか？」と確認
5. 承認されたら update_store_info で更新して完了を報告

## 行動原則
1. 短く・具体的に：LINEで読むことを意識して返答は簡潔に
2. 行動を促す：提案後は「承認しますか？」「投稿しましょうか？」と次のアクションを明示
3. 感情を汲む：苦情口コミは特に丁寧に扱う
4. ツールを使う：情報が必要な場合は必ずツールを呼び出す

## 返答スタイル
- 絵文字を適度に使って親しみやすく
- 口コミ返信文・投稿案は「」で囲んで提示する

let conversationHistory = [];
let pendingPhotoBase64 = null;
let pendingPhotoMime = null;

const CLAUDE_PROXY_URL = 'https://sfhtvtcmgueystyuhzvd.supabase.co/functions/v1/claude-proxy';

async function callClaude(userMessage, imageBase64, imageMime) {
  let userContent;
  if (imageBase64) {
    userContent = [
      { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageBase64 } },
      { type: 'text', text: userMessage || '写真を送りました。GBPに追加してください。' }
    ];
  } else {
    userContent = userMessage;
  }
  conversationHistory.push({ role: 'user', content: userContent });

  const toolsCalled = [];
  let messages = [...conversationHistory];

  for (let round = 0; round < 6; round++) {
    const res = await fetch(CLAUDE_PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1024, system: SYSTEM_PROMPT, tools: TOOLS, messages }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || 'API Error ' + res.status);
    }
    const data = await res.json();
    if (data.stop_reason === 'end_turn') {
      const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
      conversationHistory.push({ role: 'assistant', content: text });
      return { text, toolsCalled };
    }
    if (data.stop_reason === 'tool_use') {
      messages.push({ role: 'assistant', content: data.content });
      const results = [];
      for (const block of data.content) {
        if (block.type !== 'tool_use') continue;
        toolsCalled.push(block.name);
        results.push({ type: 'tool_result', tool_use_id: block.id, content: JSON.stringify(executeTool(block.name, block.input||{})) });
      }
      messages.push({ role: 'user', content: results });
      continue;
    }
    break;
  }
  throw new Error('エージェントループが最大回数を超えました');
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function nowStr() { return new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }); }

const BOT_AVATAR_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="12" rx="3"/><circle cx="9" cy="14" r="1.5" fill="white" stroke="none"/><circle cx="15" cy="14" r="1.5" fill="white" stroke="none"/><path d="M8 8V6a4 4 0 0 1 8 0v2"/><line x1="12" y1="3" x2="12" y2="4"/></svg>';

function addMessage(role, text, toolsCalled, imageDataUrl) {
  const el = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const chipsHtml = (toolsCalled && toolsCalled.length)
    ? '<div class="tool-chips">' + toolsCalled.map(t => '<span class="tool-chip">' + t + '</span>').join('') + '</div>' : '';
  const imgHtml = imageDataUrl ? '<img src="' + imageDataUrl + '" class="photo-preview" alt="送信した写真">' : '';
  if (role === 'bot') {
    wrap.innerHTML = '<div class="msg-avatar">' + BOT_AVATAR_SVG + '</div><div class="bubble-wrap"><div class="bubble">' + esc(text) + '</div>' + chipsHtml + '<div class="timestamp">' + nowStr() + '</div></div>';
  } else {
    const textHtml = text ? esc(text) : '';
    wrap.innerHTML = '<div class="bubble-wrap"><div class="bubble">' + imgHtml + textHtml + '</div><div class="timestamp">' + nowStr() + '</div></div>';
  }
  el.appendChild(wrap);
  el.scrollTop = el.scrollHeight;
  return wrap;
}

function addLoading() {
  const el = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot loading';
  wrap.innerHTML = '<div class="msg-avatar">' + BOT_AVATAR_SVG + '</div><div class="bubble-wrap"><div class="bubble">入力中…</div></div>';
  el.appendChild(wrap);
  el.scrollTop = el.scrollHeight;
  return wrap;
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  const hasPhoto = pendingPhotoBase64 !== null;
  if (!text && !hasPhoto) return;

  const sendBtn = document.getElementById('sendBtn');
  input.value = ''; autoResize(input);
  sendBtn.disabled = true;

  const photoUrl = hasPhoto ? 'data:' + pendingPhotoMime + ';base64,' + pendingPhotoBase64 : null;
  addMessage('user', text, null, photoUrl);

  const b64 = pendingPhotoBase64;
  const mime = pendingPhotoMime;
  pendingPhotoBase64 = null;
  pendingPhotoMime = null;

  const loading = addLoading();
  try {
    const result = await callClaude(text || null, b64, mime);
    loading.remove();
    if (result) addMessage('bot', result.text, result.toolsCalled);
  } catch (e) {
    loading.remove();
    addMessage('bot', 'エラー: ' + e.message);
  }
  sendBtn.disabled = false;
  input.focus();
}

function sendQuick(text) { document.getElementById('msgInput').value = text; sendMessage(); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 96) + 'px'; }
function scrollQuickBtns(dir) { document.getElementById('quickBtns').scrollBy({ left: 160 * dir, behavior: 'smooth' }); }

function triggerPhotoUpload() { document.getElementById('photoFileInput').click(); }
function handlePhotoSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  const reader = new FileReader();
  reader.onload = function(e) {
    const dataUrl = e.target.result;
    pendingPhotoBase64 = dataUrl.split(',')[1];
    pendingPhotoMime = file.type || 'image/jpeg';
    sendMessage();
  };
  reader.readAsDataURL(file);
}
