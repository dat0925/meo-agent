<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MEOコンシェルジュ — デモ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --green: #06C755;
  --green-dark: #04a344;
  --green-light: #e8faf0;
  --bg: #f0f2f5;
  --white: #ffffff;
  --gray-1: #f7f8fa;
  --gray-2: #e9eaec;
  --gray-3: #b0b7c0;
  --gray-4: #6b7585;
  --gray-5: #2d3748;
  --black: #1a202c;
  --red: #e53e3e;
  --yellow: #f6ad55;
  --blue: #3182ce;
  --radius: 18px;
  --radius-sm: 10px;
  --shadow: 0 2px 16px rgba(0,0,0,0.10);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.13);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: var(--black);
  padding-bottom: 40px;
}

/* ========== API KEY MODAL ========== */
#apiModal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.modal-box {
  background: var(--white);
  border-radius: 24px;
  padding: 36px 32px;
  width: 90%; max-width: 420px;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.modal-box h2 {
  font-family: 'Syne', sans-serif;
  font-size: 1.3rem;
  margin-bottom: 8px;
  color: var(--black);
}
.modal-box p { font-size: 0.85rem; color: var(--gray-4); margin-bottom: 20px; line-height: 1.6; }
.modal-box input {
  width: 100%;
  padding: 13px 16px;
  border: 1.5px solid var(--gray-2);
  border-radius: 12px;
  font-size: 0.95rem;
  outline: none;
  margin-bottom: 14px;
  transition: border 0.2s;
  font-family: monospace;
}
.modal-box input:focus { border-color: var(--green); }
.modal-box button {
  width: 100%;
  padding: 14px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: background 0.2s;
}
.modal-box button:hover { background: var(--green-dark); }
.modal-sub { font-size: 0.78rem; color: var(--gray-3); margin-top: 14px; }
.modal-sub a { color: var(--green); text-decoration: none; }

/* ========== HEADER ========== */
#appHeader {
  width: 100%;
  max-width: 480px;
  background: var(--white);
  border-bottom: 1.5px solid var(--gray-2);
  padding: 13px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky; top: 0;
  z-index: 100;
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
}
.header-icon {
  width: 36px; height: 36px;
  background: var(--green);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.header-title { flex: 1; }
.header-title .name {
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--black);
}
.header-title .sub {
  font-size: 0.72rem;
  color: var(--gray-3);
}
.demo-badge {
  background: #fffbe6;
  border: 1px solid var(--yellow);
  color: #b7791f;
  font-size: 0.68rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
}
.lp-link {
  font-size: 0.72rem;
  color: var(--green);
  text-decoration: none;
}

/* ========== QUICK ACTIONS ========== */
#quickActions {
  width: 100%;
  max-width: 480px;
  padding: 10px 12px 6px;
  background: var(--white);
  border-bottom: 1.5px solid var(--gray-2);
  overflow-x: auto;
  scrollbar-width: none;
  white-space: nowrap;
}
#quickActions::-webkit-scrollbar { display: none; }
.qa-btn {
  display: inline-block;
  background: var(--gray-1);
  border: 1.5px solid var(--gray-2);
  border-radius: 20px;
  padding: 6px 13px;
  font-size: 0.78rem;
  color: var(--gray-5);
  margin-right: 7px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  font-family: 'Noto Sans JP', sans-serif;
}
.qa-btn:hover { background: var(--green-light); border-color: var(--green); color: var(--green-dark); }

/* ========== CHAT ========== */
#chatWrap {
  width: 100%;
  max-width: 480px;
  flex: 1;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow-y: auto;
}

.msg { display: flex; gap: 8px; align-items: flex-end; animation: fadeUp 0.25s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user { flex-direction: row-reverse; }

.avatar {
  width: 32px; height: 32px;
  background: var(--green);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.msg.user .avatar { background: var(--gray-2); font-size: 15px; }

.bubble {
  max-width: 78%;
  background: var(--white);
  border-radius: 18px 18px 18px 4px;
  padding: 11px 14px;
  font-size: 0.875rem;
  line-height: 1.65;
  box-shadow: var(--shadow);
  color: var(--black);
  white-space: pre-wrap;
}
.msg.user .bubble {
  background: var(--green);
  color: white;
  border-radius: 18px 18px 4px 18px;
  box-shadow: 0 2px 12px rgba(6,199,85,0.25);
}
.bubble a { color: var(--green); }
.msg.user .bubble a { color: rgba(255,255,255,0.85); }

/* 画像プレビュー bubble */
.bubble .img-preview {
  width: 100%;
  max-width: 220px;
  border-radius: 12px;
  margin-top: 8px;
  display: block;
}
.bubble .gbp-photo-frame {
  background: #f5f5f5;
  border: 2px dashed var(--green);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  margin-top: 10px;
  font-size: 0.82rem;
  color: var(--gray-4);
}
.gbp-photo-frame .check { font-size: 2rem; display: block; margin-bottom: 6px; }
.gbp-photo-frame strong { color: var(--green-dark); font-size: 0.95rem; display: block; margin-bottom: 3px; }

/* store info card */
.info-card {
  background: var(--gray-1);
  border-radius: 12px;
  padding: 12px 14px;
  margin-top: 8px;
  font-size: 0.82rem;
  line-height: 1.7;
}
.info-card .row { display: flex; gap: 8px; align-items: flex-start; }
.info-card .label { color: var(--gray-4); min-width: 60px; font-size: 0.78rem; }
.info-card .val { color: var(--black); font-weight: 500; }
.info-card .changed { color: var(--green-dark); font-weight: 700; }

/* action buttons inside bubble */
.bubble-actions { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
.bub-btn {
  background: white;
  border: 1.5px solid var(--green);
  color: var(--green-dark);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.80rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Noto Sans JP', sans-serif;
}
.bub-btn:hover { background: var(--green); color: white; }
.bub-btn.red { border-color: var(--red); color: var(--red); }
.bub-btn.red:hover { background: var(--red); color: white; }

/* typing */
.typing-bubble {
  background: var(--white);
  border-radius: 18px 18px 18px 4px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 5px;
  box-shadow: var(--shadow);
  width: 58px;
}
.typing-bubble span {
  width: 7px; height: 7px;
  background: var(--gray-3);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); }
  40% { transform: translateY(-7px); }
}

/* date divider */
.date-divider {
  text-align: center;
  font-size: 0.72rem;
  color: var(--gray-3);
  padding: 4px 0;
}

/* ========== INPUT AREA ========== */
#inputArea {
  width: 100%;
  max-width: 480px;
  background: var(--white);
  border-top: 1.5px solid var(--gray-2);
  padding: 10px 12px;
  display: flex;
  gap: 8px;
  align-items: flex-end;
  position: sticky; bottom: 0;
}

/* 写真アップロードボタン */
#photoBtn {
  width: 40px; height: 40px;
  background: var(--gray-1);
  border: 1.5px solid var(--gray-2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 18px;
  flex-shrink: 0;
  transition: all 0.15s;
}
#photoBtn:hover { background: var(--green-light); border-color: var(--green); }
#photoInput { display: none; }

#chatInput {
  flex: 1;
  min-height: 40px;
  max-height: 120px;
  padding: 10px 14px;
  border: 1.5px solid var(--gray-2);
  border-radius: 22px;
  resize: none;
  font-size: 0.90rem;
  font-family: 'Noto Sans JP', sans-serif;
  outline: none;
  transition: border 0.2s;
  line-height: 1.5;
}
#chatInput:focus { border-color: var(--green); }
#chatInput::placeholder { color: var(--gray-3); }

#sendBtn {
  width: 40px; height: 40px;
  background: var(--green);
  border: none;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.2s, transform 0.1s;
  font-size: 18px;
}
#sendBtn:hover { background: var(--green-dark); }
#sendBtn:active { transform: scale(0.93); }
#sendBtn:disabled { background: var(--gray-2); cursor: not-allowed; }
</style>
</head>
<body>

<!-- API KEY MODAL -->
<div id="apiModal">
  <div class="modal-box">
    <h2>🔑 APIキーを入力</h2>
    <p>このデモはブラウザから直接 Claude API を呼び出します。<br>入力したキーはブラウザにのみ保存され、外部には送信されません。</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off">
    <button onclick="startDemo()">デモを開始する</button>
    <p class="modal-sub"><a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> でAPIキーを取得できます</p>
  </div>
</div>

<!-- HEADER -->
<div id="appHeader" style="display:none">
  <div class="header-icon">🤖</div>
  <div class="header-title">
    <div class="name">MEOコンシェルジュ</div>
    <div class="sub">焼肉 大将 ・ <span style="color:var(--green)">●</span> オンライン</div>
  </div>
  <span class="demo-badge">DEMO</span>
  <a href="https://agt-lp.taskra.jp/" target="_blank" class="lp-link">▶ LP</a>
</div>

<!-- QUICK ACTIONS -->
<div id="quickActions" style="display:none">
  <span class="qa-btn" onclick="quickSend('未返信の口コミを見せて')">💬 口コミ確認</span>
  <span class="qa-btn" onclick="quickSend('GBP投稿案を作って')">📝 投稿を作る</span>
  <span class="qa-btn" onclick="quickSend('先月のデータ教えて')">📊 データ分析</span>
  <span class="qa-btn" onclick="quickSend('店舗情報を変更したい')">✏️ 店舗情報変更</span>
  <span class="qa-btn" onclick="uploadPhoto()">📸 写真を送る</span>
  <span class="qa-btn" onclick="quickSend('キーワード順位を教えて')">📍 順位確認</span>
  <span class="qa-btn" onclick="quickSend('今月の月次レポートをまとめて')">📋 月次レポート</span>
  <span class="qa-btn" onclick="quickSend('AI画像を生成して投稿したい')">🎨 AI画像生成</span>
</div>

<!-- CHAT -->
<div id="chatWrap" style="display:none"></div>

<!-- INPUT -->
<div id="inputArea" style="display:none">
  <div id="photoBtn" onclick="uploadPhoto()" title="写真を送る">📷</div>
  <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoUpload(event)">
  <textarea id="chatInput" placeholder="メッセージを入力…" rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"
    oninput="autoResize(this)"></textarea>
  <button id="sendBtn" onclick="sendMsg()">➤</button>
</div>

<script>
// ===================== STATE =====================
let ANTHROPIC_KEY = '';
let messages = [];
let isLoading = false;

// Store state (デモ用の店舗情報)
let storeInfo = {
  name: '焼肉 大将',
  address: '東京都渋谷区渋谷2-10-3 渋谷グランベルビル2F',
  category: '焼肉店',
  phone: '03-1234-5678',
  hours: {
    mon: '11:00〜23:00',
    tue: '11:00〜23:00',
    wed: '11:00〜23:00',
    thu: '11:00〜23:00',
    fri: '11:00〜24:00',
    sat: '10:00〜24:00',
    sun: '10:00〜22:00',
  },
  holiday: 'なし（年中無休）',
  url: 'https://yakiniku-taisho.example.com',
  description: '厳選和牛を使用した本格焼肉店。個室完備で接待・記念日にも最適。',
  photos: 12,
};

// 変更待ち状態管理
let pendingChange = null; // { field, value, displayLabel }

// ===================== INIT =====================
function startDemo() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('sk-')) {
    alert('有効なAPIキーを入力してください（sk-ant-...）');
    return;
  }
  ANTHROPIC_KEY = key;
  localStorage.setItem('meo_demo_key', key);
  document.getElementById('apiModal').style.display = 'none';
  document.getElementById('appHeader').style.display = 'flex';
  document.getElementById('quickActions').style.display = 'block';
  document.getElementById('chatWrap').style.display = 'flex';
  document.getElementById('inputArea').style.display = 'flex';
  addDateDivider('今日');
  addBotMsg(
`こんにちは！MEOコンシェルジュです 🤖

**焼肉 大将** のGBP管理をサポートします。

できることをいくつか紹介しますね👇

📬 **口コミ返信** — 新しい口コミを確認して返信文を自動生成
📝 **GBP投稿** — 集客につながる投稿案を提案・公開
📊 **データ分析** — インサイトをわかりやすく解説
📸 **写真追加** — 写真を送るだけでGBPにアップロード
✏️ **店舗情報変更** — 住所・営業時間など情報をここで変更
📍 **キーワード順位** — 週次の検索順位を確認

上のショートカットか、自由にメッセージを送ってください！`
  );
}

// ===================== SYSTEM PROMPT =====================
function buildSystemPrompt() {
  return `あなたは「MEOコンシェルジュ」というAIです。
Googleビジネスプロフィール（GBP）の管理をLINEライクなチャットUIでサポートします。

## 担当店舗情報（現在の登録内容）
店舗名: ${storeInfo.name}
業種: ${storeInfo.category}
住所: ${storeInfo.address}
電話: ${storeInfo.phone}
URL: ${storeInfo.url}
定休日: ${storeInfo.holiday}
営業時間:
  月: ${storeInfo.hours.mon}
  火: ${storeInfo.hours.tue}
  水: ${storeInfo.hours.wed}
  木: ${storeInfo.hours.thu}
  金: ${storeInfo.hours.fri}
  土: ${storeInfo.hours.sat}
  日: ${storeInfo.hours.sun}
紹介文: ${storeInfo.description}
登録写真数: ${storeInfo.photos}枚

## あなたができること（デモとして疑似的に実行してください）
1. **口コミ返信**: 未返信口コミをリストアップし、返信案を生成。「投稿して」と言われたらGBPに投稿完了を伝える
2. **GBP投稿**: 季節・業種に合った投稿案を生成。「投稿して」と言われたら投稿完了を伝える
3. **データ分析**: インサイト（検索数・マップ表示・クリック数など）を疑似データで解説
4. **写真管理**: ユーザーが写真を送ったとき、「GBPの写真フォルダに追加しました」と伝える（写真カテゴリ: 内観・外観・料理・チームなどを確認）
5. **店舗情報変更**: ユーザーが「店舗情報を変更したい」と言ったら、変更したい項目（住所/業種/電話/営業時間/定休日/紹介文/URL）を聞き、新しい内容を確認し、最後に確定してもらう。確定後はGBPに反映完了を伝える。営業時間は曜日ごとに聞く
6. **キーワード順位**: 「焼肉 渋谷」など登録キーワードの疑似順位データを提示
7. **月次レポート**: 先月の集客データサマリーとアクションプランを提示
8. **AI画像生成**: DALL-E 3で生成するイメージを説明し、GBP投稿用に使えることを伝える

## 重要なルール
- 口コミ返信・写真アップロード・投稿公開は、必ず「確認してから実行」するステップを踏む
- 店舗情報変更時は、変更内容を必ず確認してから「GBPに反映しますか？」と聞く
- 日本語で、LINE感覚の自然な会話口調で話す。絵文字を適度に使う
- 返答は短めに。長い場合は分けて伝える
- デモであることは隠さず、実際のGBPへのアクセスはないが、リアルな体験ができるよう演じる

## 店舗情報変更の特別な出力フォーマット
店舗情報の変更が確定したとき（ユーザーが「はい」「OK」「お願い」などと確定した場合）は、
応答の末尾に以下のJSONタグを追加してください（ユーザーには見えません）:

<STORE_UPDATE>{"field":"フィールドキー","value":"新しい値"}</STORE_UPDATE>

フィールドキー: address, category, phone, url, holiday, description,
hours_mon, hours_tue, hours_wed, hours_thu, hours_fri, hours_sat, hours_sun

複数変更の場合は複数のタグを出力してください。`;
}

// ===================== SEND =====================
async function sendMsg(text) {
  if (isLoading) return;
  const input = document.getElementById('chatInput');
  const userText = text || input.value.trim();
  if (!userText) return;
  input.value = '';
  autoResize(input);

  addUserMsg(userText);
  messages.push({ role: 'user', content: userText });
  await callClaude();
}

function quickSend(text) { sendMsg(text); }

async function callClaude() {
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  const typingId = addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: buildSystemPrompt(),
        messages: messages
      })
    });

    removeTyping(typingId);
    const data = await res.json();

    if (data.error) {
      addBotMsg('⚠️ エラー: ' + data.error.message);
      return;
    }

    const raw = data.content[0].text;
    
    // STORE_UPDATE タグを処理
    const updateMatches = [...raw.matchAll(/<STORE_UPDATE>(.*?)<\/STORE_UPDATE>/g)];
    let displayText = raw.replace(/<STORE_UPDATE>.*?<\/STORE_UPDATE>/g, '').trim();
    
    addBotMsg(displayText);
    messages.push({ role: 'assistant', content: raw });

    // 店舗情報を更新
    for (const match of updateMatches) {
      try {
        const update = JSON.parse(match[1]);
        applyStoreUpdate(update.field, update.value);
      } catch(e) {}
    }

  } catch(e) {
    removeTyping(typingId);
    addBotMsg('⚠️ 通信エラーが発生しました。APIキーを確認してください。');
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

function applyStoreUpdate(field, value) {
  if (field === 'address') storeInfo.address = value;
  else if (field === 'category') storeInfo.category = value;
  else if (field === 'phone') storeInfo.phone = value;
  else if (field === 'url') storeInfo.url = value;
  else if (field === 'holiday') storeInfo.holiday = value;
  else if (field === 'description') storeInfo.description = value;
  else if (field.startsWith('hours_')) {
    const day = field.replace('hours_', '');
    storeInfo.hours[day] = value;
  }
}

// ===================== PHOTO UPLOAD =====================
function uploadPhoto() {
  document.getElementById('photoInput').click();
}

async function handlePhotoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const reader = new FileReader();
  reader.onload = async (e) => {
    const dataUrl = e.target.result;
    
    // ユーザー側に写真プレビューを表示
    addPhotoMsg(dataUrl, file.name);
    
    // Claudeへ: base64付きでリクエスト
    const base64 = dataUrl.split(',')[1];
    const mimeType = file.type || 'image/jpeg';
    
    messages.push({
      role: 'user',
      content: [
        {
          type: 'image',
          source: { type: 'base64', media_type: mimeType, data: base64 }
        },
        {
          type: 'text',
          text: '写真を送りました。GBPに追加してください。'
        }
      ]
    });

    await callClaudePhoto();
  };
  reader.readAsDataURL(file);
}

async function callClaudePhoto() {
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  const typingId = addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: buildSystemPrompt() + `
        
## 写真受信時の特別指示
ユーザーから写真が送られてきました。以下の手順で対応してください:
1. 写真の内容を一言説明（料理・内観・外観・スタッフなど何の写真か）
2. GBPの写真カテゴリを提案（「料理」「内観」「外観」「チーム」など）
3. 「このカテゴリでGBPに追加しますか？」と確認
4. ユーザーが確定したら「✅ GBPの写真フォルダに追加しました！登録枚数: ${storeInfo.photos + 1}枚」と伝える
`,
        messages: messages
      })
    });

    removeTyping(typingId);
    const data = await res.json();
    const raw = data.content[0].text;
    addBotMsg(raw);
    messages.push({ role: 'assistant', content: raw });
    
    // 追加ボタン付きメッセージを処理
    if (raw.includes('追加しますか') || raw.includes('アップロードしますか')) {
      addPhotoConfirmButtons();
    }

  } catch(e) {
    removeTyping(typingId);
    addBotMsg('⚠️ エラーが発生しました。');
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

// ===================== DOM HELPERS =====================
function addDateDivider(text) {
  const chat = document.getElementById('chatWrap');
  const d = document.createElement('div');
  d.className = 'date-divider';
  d.textContent = text;
  chat.appendChild(d);
}

function addUserMsg(text) {
  const chat = document.getElementById('chatWrap');
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = `
    <div class="avatar">👤</div>
    <div class="bubble">${escHtml(text)}</div>
  `;
  chat.appendChild(msg);
  scrollBottom();
}

function addPhotoMsg(dataUrl, name) {
  const chat = document.getElementById('chatWrap');
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = `
    <div class="avatar">👤</div>
    <div class="bubble">
      <div style="font-size:0.78rem;margin-bottom:6px;opacity:0.8">📷 ${escHtml(name)}</div>
      <img src="${dataUrl}" class="img-preview" alt="upload">
    </div>
  `;
  chat.appendChild(msg);
  scrollBottom();
}

function addPhotoConfirmButtons() {
  const chat = document.getElementById('chatWrap');
  const wrap = document.createElement('div');
  wrap.className = 'msg user';
  wrap.style.justifyContent = 'flex-end';
  wrap.innerHTML = `
    <div class="bubble-actions" style="margin:0 0 0 auto">
      <button class="bub-btn" onclick="quickSend('料理カテゴリで追加して')">料理で追加</button>
      <button class="bub-btn" onclick="quickSend('内観カテゴリで追加して')">内観で追加</button>
      <button class="bub-btn" onclick="quickSend('外観カテゴリで追加して')">外観で追加</button>
    </div>
  `;
  chat.appendChild(wrap);
  scrollBottom();
}

function addBotMsg(text) {
  const chat = document.getElementById('chatWrap');
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  const formatted = formatText(text);
  msg.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble">${formatted}</div>
  `;
  chat.appendChild(msg);
  scrollBottom();
}

function addTyping() {
  const chat = document.getElementById('chatWrap');
  const id = 'typing_' + Date.now();
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  msg.id = id;
  msg.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="typing-bubble"><span></span><span></span><span></span></div>
  `;
  chat.appendChild(msg);
  scrollBottom();
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function scrollBottom() {
  const chat = document.getElementById('chatWrap');
  setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatText(text) {
  // **bold**
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // *italic*
  text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
  // line breaks
  text = text.replace(/\n/g, '<br>');
  return text;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ===================== AUTO-LOAD KEY =====================
window.addEventListener('load', () => {
  const saved = localStorage.getItem('meo_demo_key');
  if (saved) {
    document.getElementById('apiKeyInput').value = saved;
  }
});
</script>
