<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MEOコンシェルジュ — デモ</title>
<style>
:root {
  --green: #1a7a4a;
  --green-dark: #145f3a;
  --green-light: #f0f7f3;
  --green-mid: rgba(26,122,74,.15);
  --bg-chat: #f2f4f6;
  --white: #ffffff;
  --text: #1c1c1e;
  --text-mid: #6e6e73;
  --border: #e4e4e8;
  --radius: 18px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: #d8dde3;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ---- モーダル ---- */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5); backdrop-filter: blur(8px);
  display: flex; justify-content: center; align-items: center; z-index: 200;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: white; border-radius: 20px; padding: 36px 32px;
  width: 90%; max-width: 400px;
  box-shadow: 0 24px 64px rgba(0,0,0,.25);
}
.modal-icon {
  width: 52px; height: 52px; background: var(--green-light);
  border-radius: 14px; display: flex; align-items: center; justify-content: center;
  margin-bottom: 18px;
}
.modal-icon svg { width: 26px; height: 26px; }
.modal h2 { font-size: 17px; font-weight: 800; margin-bottom: 6px; color: var(--text); }
.modal p { font-size: 13px; color: var(--text-mid); margin-bottom: 20px; line-height: 1.65; }
.modal input {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 14px; margin-bottom: 12px; outline: none;
  transition: border-color .15s; font-family: inherit; color: var(--text);
}
.modal input:focus { border-color: var(--green); }
.modal-btn {
  width: 100%; padding: 13px; background: var(--green); color: white;
  border: none; border-radius: 10px; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: opacity .15s; font-family: inherit;
}
.modal-btn:hover { opacity: .88; }
.modal-note { font-size: 11px; color: var(--text-mid); margin-top: 10px; text-align: center; }
.modal-note a { color: var(--green); text-decoration: none; }
.modal-service-link { margin-top: 10px; text-align: center; }
.modal-service-link a { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-mid); text-decoration: none; transition: color .15s; }
.modal-service-link a:hover { color: var(--green); }

/* ---- PIN認証専用 ---- */
.pin-input {
  width: 100%; padding: 14px 16px; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 22px; letter-spacing: 8px; text-align: center;
  margin-bottom: 12px; outline: none; transition: border-color .15s;
  font-family: inherit; color: var(--text); font-weight: 700;
  -webkit-text-security: disc;
}
.pin-input:focus { border-color: var(--green); }
.pin-input.shake { animation: pinShake .4s; border-color: #e54848; }
@keyframes pinShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
.pin-error { font-size: 12px; color: #e54848; margin-bottom: 10px; min-height: 16px; text-align: center; }

/* ---- チャットコンテナ ---- */
.container {
  width: 100%; max-width: 460px; height: 100svh;
  display: flex; flex-direction: column; background: var(--bg-chat);
  box-shadow: 0 0 60px rgba(0,0,0,.2);
  overflow: hidden;
}

/* ---- ヘッダー ---- */
.header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.bot-avatar {
  width: 38px; height: 38px; border-radius: 12px;
  background: linear-gradient(135deg, #1a7a4a, #2eb872);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.bot-avatar svg { width: 22px; height: 22px; }
.header-name {
  font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2;
  display: flex; align-items: center; gap: 6px;
}
.online-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #34c759;
  display: inline-block; flex-shrink: 0;
}
.header-sub { font-size: 11px; color: var(--text-mid); margin-top: 1px; }
.header-demo-badge {
  background: var(--green-light); color: var(--green);
  border: 1px solid rgba(26,122,74,.2);
  border-radius: 6px; padding: 2px 8px; font-size: 10px; font-weight: 700;
  letter-spacing: .04em;
}
.header-actions { display: flex; align-items: center; gap: 4px; }
.header-icon-btn {
  width: 34px; height: 34px; border-radius: 8px; border: none;
  background: none; cursor: pointer; display: flex; align-items: center;
  justify-content: center; color: var(--text-mid); transition: background .15s;
  text-decoration: none;
}
.header-icon-btn:hover { background: var(--green-light); color: var(--green); }
.header-icon-btn svg { width: 18px; height: 18px; }

/* ---- メッセージエリア ---- */
.messages {
  flex: 1; overflow-y: auto; padding: 16px 14px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 2px; }

.msg { display: flex; gap: 8px; align-items: flex-end; }
.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px; border-radius: 10px;
  background: linear-gradient(135deg, #1a7a4a, #2eb872);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.msg-avatar svg { width: 17px; height: 17px; }

.bubble-wrap { display: flex; flex-direction: column; max-width: 80%; }
.msg.user .bubble-wrap { align-items: flex-end; }

.bubble {
  padding: 10px 14px; line-height: 1.65; font-size: 13.5px;
  white-space: pre-wrap; word-break: break-word;
}
.msg.bot .bubble {
  background: var(--white); color: var(--text);
  border-radius: 16px 16px 16px 4px;
  box-shadow: 0 1px 4px rgba(0,0,0,.07);
}
.msg.user .bubble {
  background: var(--green); color: white;
  border-radius: 16px 16px 4px 16px;
}
.msg.loading .bubble { color: var(--text-mid); font-style: italic; }

.bubble img.photo-preview {
  max-width: 200px; max-height: 160px;
  border-radius: 10px; display: block; margin-bottom: 4px;
  object-fit: cover;
}

.tool-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.tool-chip {
  font-size: 10px; background: var(--green-light); color: var(--green);
  border: 1px solid rgba(26,122,74,.2); border-radius: 100px; padding: 2px 8px;
  font-weight: 600;
}
.timestamp { font-size: 10px; color: var(--text-mid); margin-top: 4px; }

.date-divider {
  align-self: center; font-size: 11px; color: var(--text-mid);
  background: rgba(0,0,0,.07); border-radius: 100px;
  padding: 3px 12px;
}

/* ---- 承認カード ---- */
.approval-card {
  background: #fffbeb; border: 2px solid #f59e0b;
  border-radius: 16px; padding: 16px; margin: 4px 0;
  max-width: 88%;
}
.approval-card-header {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; font-weight: 800; color: #92400e; margin-bottom: 10px;
}
.approval-card-title {
  font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px;
}
.approval-card-body {
  font-size: 12.5px; color: var(--text-mid); background: white;
  border-radius: 8px; padding: 10px 12px; line-height: 1.65;
  white-space: pre-wrap; margin-bottom: 12px;
  border: 1px solid var(--border);
}
.approval-btns { display: flex; gap: 8px; }
.approval-btn-ok {
  flex: 1; padding: 10px; background: var(--green); color: white;
  border: none; border-radius: 10px; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: opacity .15s;
}
.approval-btn-ok:hover { opacity: .85; }
.approval-btn-cancel {
  flex: 1; padding: 10px; background: white; color: var(--text-mid);
  border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px;
  font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s;
}
.approval-btn-cancel:hover { border-color: #ef4444; color: #ef4444; }
.approval-done {
  font-size: 12px; color: var(--text-mid); display: flex;
  align-items: center; gap: 5px; padding-top: 4px;
}

/* ---- クイックボタン ---- */
.quick-btns-wrap {
  background: var(--white); border-top: 1px solid var(--border);
  flex-shrink: 0; padding: 10px 12px 12px;
}
.quick-btns-label {
  font-size: 10px; font-weight: 700; color: var(--text-mid);
  letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px;
}
.quick-btns {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 7px;
}
.quick-btn {
  display: flex; flex-direction: column; align-items: center;
  gap: 5px; padding: 11px 6px 10px;
  border: 1.5px solid var(--border); border-radius: 14px;
  background: var(--white); cursor: pointer; font-family: inherit;
  transition: border-color .15s, background .15s, transform .1s;
}
.quick-btn:hover { border-color: var(--green); background: var(--green-light); transform: translateY(-1px); }
.quick-btn:active { transform: translateY(0); }
.quick-btn-icon { font-size: 22px; line-height: 1; }
.ai-image-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.ai-image-action-btn {
  flex: 1; min-width: 120px; padding: 9px 10px;
  border-radius: 10px; font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: inherit; border: 1.5px solid var(--border);
  background: white; color: var(--text); transition: all .15s;
}
.ai-image-action-btn:hover { border-color: var(--green); background: var(--green-light); }
.ai-image-action-btn:disabled { opacity: .5; cursor: default; }
.quick-btn-label { font-size: 10.5px; color: var(--text-mid); font-weight: 600; text-align: center; line-height: 1.3; white-space: nowrap; }
.quick-btn-icon-wrap { position: relative; display: inline-flex; }
.quick-btn-badge {
  position: absolute; top: -5px; right: -8px;
  background: #ef4444; color: white;
  font-size: 9px; font-weight: 800; line-height: 1;
  padding: 2px 5px; border-radius: 100px;
  min-width: 16px; text-align: center;
}

/* ---- デザイン切り替えトグル ---- */
.design-toggle {
  display: flex; align-items: center; gap: 4px;
  background: var(--bg-chat); border-radius: 8px; padding: 3px;
}
.design-toggle-btn {
  padding: 3px 9px; border-radius: 6px; font-size: 10px; font-weight: 700;
  border: none; cursor: pointer; font-family: inherit; color: var(--text-mid);
  background: transparent; transition: all .15s; letter-spacing: .02em;
}
.design-toggle-btn.active {
  background: white; color: var(--green);
  box-shadow: 0 1px 3px rgba(0,0,0,.1);
}

/* ---- デザインB：メリハリ案 ---- */
.quick-btns-b { display: none; flex-direction: column; gap: 7px; }
.quick-btns-b.visible { display: flex; }
.quick-btns-a.hidden { display: none; }

/* 大ボタン行（2分割） */
.qb-row-primary { display: flex; gap: 7px; }

/* 大ボタン */
.qb-btn-primary {
  flex: 1; display: flex; align-items: center; gap: 10px;
  padding: 11px 13px; border-radius: 14px;
  border: 1.5px solid var(--border);
  background: var(--white); cursor: pointer; font-family: inherit;
  transition: border-color .15s, background .15s, transform .1s;
  text-align: left; min-width: 0;
}
.qb-btn-primary:hover { border-color: var(--green); background: var(--green-light); transform: translateY(-1px); }
.qb-btn-primary:active { transform: translateY(0); }

/* 大ボタン：口コミはアクセントカラーで強調 */
.qb-btn-primary.highlight {
  background: var(--green); border-color: var(--green);
}
.qb-btn-primary.highlight:hover { background: var(--green-dark); border-color: var(--green-dark); transform: translateY(-1px); }
.qb-btn-primary.highlight .qb-pri-icon { background: rgba(255,255,255,.2); color: white; }
.qb-btn-primary.highlight .qb-pri-label { color: white; }
.qb-btn-primary.highlight .qb-pri-desc { color: rgba(255,255,255,.75); }

.qb-pri-icon {
  width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
  background: var(--green-light); color: var(--green);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.qb-pri-icon svg { width: 16px; height: 16px; }
.qb-btn-primary:not(.highlight):hover .qb-pri-icon { background: rgba(26,122,74,.2); }
.qb-pri-text { min-width: 0; }
.qb-pri-label {
  font-size: 12px; font-weight: 800; color: var(--text);
  line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.qb-pri-desc {
  font-size: 10px; color: var(--text-mid); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* バッジ（大ボタン用） */
.qb-pri-badge-wrap { position: relative; display: inline-flex; flex-shrink: 0; }
.qb-badge {
  position: absolute; top: -5px; right: -7px;
  background: #ef4444; color: white;
  font-size: 9px; font-weight: 800; line-height: 1;
  padding: 2px 5px; border-radius: 100px; min-width: 16px; text-align: center;
}

/* 中ボタン行（3分割） */
.qb-row-secondary { display: flex; gap: 7px; }

.qb-btn-secondary {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 5px; padding: 9px 4px 8px;
  border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--white); cursor: pointer; font-family: inherit;
  transition: border-color .15s, background .15s, transform .1s;
  min-width: 0;
}
.qb-btn-secondary:hover { border-color: var(--green); background: var(--green-light); transform: translateY(-1px); }
.qb-btn-secondary:active { transform: translateY(0); }

.qb-sec-icon {
  width: 26px; height: 26px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  background: var(--green-light); color: var(--green);
  transition: background .15s; flex-shrink: 0;
}
.qb-sec-icon svg { width: 13px; height: 13px; }
.qb-btn-secondary:hover .qb-sec-icon { background: rgba(26,122,74,.2); }
.qb-sec-icon.accent { background: #fef3c7; color: #d97706; }
.qb-btn-secondary:hover .qb-sec-icon.accent { background: #fde68a; }
.qb-sec-label {
  font-size: 10px; font-weight: 700; color: var(--text);
  text-align: center; line-height: 1.2; white-space: nowrap;
}

/* 小ボタン行（5分割：データ系） */
.qb-row-tertiary {
  display: flex; gap: 5px;
  padding-top: 2px;
  border-top: 1px solid var(--border);
}
.qb-btn-tertiary {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 7px 2px 6px;
  border-radius: 10px; border: none;
  background: transparent; cursor: pointer; font-family: inherit;
  transition: background .15s;
  min-width: 0;
}
.qb-btn-tertiary:hover { background: var(--green-light); }
.qb-btn-tertiary:active { background: rgba(26,122,74,.15); }
.qb-ter-icon { color: var(--text-mid); display: flex; align-items: center; justify-content: center; }
.qb-ter-icon svg { width: 14px; height: 14px; }
.qb-btn-tertiary:hover .qb-ter-icon { color: var(--green); }
.qb-ter-label {
  font-size: 9px; font-weight: 600; color: var(--text-mid);
  text-align: center; line-height: 1.2; white-space: nowrap;
}
.qb-btn-tertiary:hover .qb-ter-label { color: var(--green); }

/* ---- 入力エリア ---- */
.input-area {
  padding: 10px 14px 14px; background: var(--white);
  border-top: 1px solid var(--border);
  display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0;
}
.photo-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--white);
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-mid); transition: all .15s;
}
.photo-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
.photo-btn svg { width: 17px; height: 17px; }
#photoFileInput { display: none; }
.input-area textarea {
  flex: 1; padding: 9px 14px;
  border: 1.5px solid var(--border); border-radius: 20px;
  font-size: 14px; outline: none; resize: none;
  max-height: 96px; line-height: 1.5; font-family: inherit;
  color: var(--text); background: var(--bg-chat);
  transition: border-color .15s;
}
.input-area textarea:focus { border-color: var(--green); background: white; }
.send-btn {
  width: 38px; height: 38px; background: var(--green); color: white;
  border: none; border-radius: 50%; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .15s;
}
.send-btn svg { width: 16px; height: 16px; }
.send-btn:disabled { background: var(--border); cursor: default; }
.send-btn:not(:disabled):hover { opacity: .85; }

/* ---- スマホ試用QRカード（デスクトップのみ表示） ---- */
.qr-card {
  position: fixed; bottom: 28px; right: 28px; z-index: 100;
  background: white; border-radius: 16px;
  padding: 16px 18px; text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
  display: none;
}
@media (min-width: 520px) { .qr-card { display: block; } }
.qr-card-label {
  font-size: 11px; font-weight: 700; color: var(--text-mid);
  letter-spacing: .04em; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.qr-card-label svg { width: 13px; height: 13px; flex-shrink: 0; }
#qrcode canvas, #qrcode img { display: block; border-radius: 8px; }
.qr-card-url {
  font-size: 9px; color: var(--text-mid); margin-top: 8px;
  word-break: break-all; max-width: 120px;
}

/* ---- 基本設定パネル ---- */
.container { position: relative; }
.settings-panel {
  position: absolute; inset: 0; z-index: 100;
  background: #f2f4f6;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
}
.settings-panel.open { transform: translateX(0); }
.settings-header {
  background: white; border-bottom: 1px solid var(--border);
  padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.settings-back-btn {
  width: 34px; height: 34px; border: none; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--green); border-radius: 8px;
}
.settings-back-btn:hover { background: var(--green-light); }
.settings-back-btn svg { width: 20px; height: 20px; }
.settings-title { font-size: 15px; font-weight: 800; color: var(--text); }
.settings-body { flex: 1; overflow-y: auto; padding: 16px 14px; }
.settings-section {
  background: white; border-radius: 16px; margin-bottom: 16px;
  overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.settings-section-title {
  font-size: 11px; font-weight: 700; color: var(--text-mid);
  letter-spacing: .06em; padding: 14px 16px 8px; text-transform: uppercase;
}
.settings-row {
  padding: 10px 16px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.settings-row:first-of-type { border-top: none; }
.settings-row label { font-size: 13px; color: var(--text); font-weight: 600; min-width: 80px; }
.settings-input {
  flex: 1; padding: 8px 12px; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 13px; font-family: inherit;
  color: var(--text); outline: none; transition: border-color .15s;
}
.settings-input:focus { border-color: var(--green); }
.keyword-list { padding: 10px 16px 4px; display: flex; flex-wrap: wrap; gap: 6px; }
.keyword-tag {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--green-light); color: var(--green);
  border: 1px solid rgba(26,122,74,.25); border-radius: 100px;
  padding: 4px 10px; font-size: 12px; font-weight: 600;
}
.keyword-tag button {
  background: none; border: none; cursor: pointer; color: var(--green);
  font-size: 14px; line-height: 1; padding: 0; display: flex; align-items: center;
}
.add-kw-row { padding: 8px 16px 14px; display: flex; gap: 8px; }
.add-kw-row input {
  flex: 1; padding: 8px 12px; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 13px; font-family: inherit;
  color: var(--text); outline: none; transition: border-color .15s;
}
.add-kw-row input:focus { border-color: var(--green); }
.add-kw-btn {
  padding: 8px 14px; background: var(--green); color: white;
  border: none; border-radius: 10px; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit; white-space: nowrap;
}
.location-entry {
  border-top: 1px solid var(--border); padding: 12px 16px;
  display: flex; gap: 8px; align-items: flex-start;
}
.location-entry:first-of-type { border-top: none; }
.location-fields { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.location-remove {
  background: none; border: none; cursor: pointer; color: #ef4444;
  font-size: 18px; padding: 2px; line-height: 1; align-self: center;
}
.add-location-row { padding: 8px 16px 14px; }
.add-location-btn {
  width: 100%; padding: 10px; background: var(--green-light); color: var(--green);
  border: 1.5px dashed rgba(26,122,74,.4); border-radius: 10px;
  font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
}
.settings-save-row { padding: 0 14px 16px; }
.settings-save-btn {
  width: 100%; padding: 13px; background: var(--green); color: white;
  border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: opacity .15s;
}
.settings-save-btn:hover { opacity: .88; }

/* ---- ボトムシート ---- */
.sheet-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,.4);
  z-index: 80; display: none;
}
.sheet-overlay.open { display: block; }
.bottom-sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: white; border-radius: 20px 20px 0 0;
  padding: 12px 14px 28px; z-index: 81;
  transform: translateY(100%);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
}
.sheet-overlay.open .bottom-sheet { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 0 auto 14px;
}
.sheet-title { font-size: 13px; font-weight: 700; color: var(--text-mid); margin-bottom: 10px; text-align: center; }
.sheet-option {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 14px; border-radius: 12px; cursor: pointer;
  border: none; background: none; font-family: inherit; width: 100%;
  transition: background .15s; text-align: left; margin-bottom: 4px;
}
.sheet-option:hover { background: var(--green-light); }
.sheet-option-icon { font-size: 22px; width: 36px; text-align: center; flex-shrink: 0; }
.sheet-option-text { display: flex; flex-direction: column; gap: 2px; }
.sheet-option-label { font-size: 14px; font-weight: 700; color: var(--text); }
.sheet-option-desc { font-size: 11px; color: var(--text-mid); }
.sheet-cancel {
  width: 100%; padding: 12px; background: #f2f4f6; color: var(--text-mid);
  border: none; border-radius: 12px; font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit; margin-top: 6px;
}

/* ---- 苦情対応モーダル ---- */
.complaint-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,.5);
  z-index: 90; display: none; align-items: flex-end;
}
.complaint-overlay.open { display: flex; }
.complaint-modal {
  background: white; border-radius: 20px 20px 0 0;
  padding: 20px 16px 28px; width: 100%;
  max-height: 85%;
  display: flex; flex-direction: column;
}
.complaint-modal h3 { font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.complaint-modal .complaint-sub { font-size: 12px; color: var(--text-mid); margin-bottom: 14px; }
.complaint-textarea {
  width: 100%; padding: 11px 13px; border: 1.5px solid var(--border);
  border-radius: 12px; font-size: 13px; font-family: inherit; color: var(--text);
  resize: none; outline: none; min-height: 100px; transition: border-color .15s;
  margin-bottom: 14px;
}
.complaint-textarea:focus { border-color: var(--green); }
.complaint-style-label { font-size: 12px; font-weight: 700; color: var(--text-mid); margin-bottom: 8px; }
.style-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
.style-chip {
  padding: 7px 14px; border-radius: 100px;
  border: 1.5px solid var(--border); background: white;
  font-size: 13px; font-weight: 600; color: var(--text-mid);
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.style-chip.selected { border-color: var(--green); background: var(--green-light); color: var(--green); }
.complaint-submit {
  width: 100%; padding: 13px; background: var(--green); color: white;
  border: none; border-radius: 12px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: opacity .15s;
}
.complaint-submit:hover { opacity: .88; }
.complaint-cancel-btn {
  width: 100%; padding: 10px; background: none; color: var(--text-mid);
  border: none; font-size: 13px; cursor: pointer; font-family: inherit; margin-top: 6px;
}
</style>
</head>

// ============================================================
// PIN認証
// ============================================================
const PIN_CONFIG = {
  salt: 'af5c9fa7415c78c02b6ec9f03718c2ed',
  hash: '535a7836857516becd1033e3b8d09c92787691aa7594ffdb9805245245ec62f9',
  iterations: 10000,
  storageKey: 'meo_agent_pin_auth',
  attemptKey: 'meo_agent_pin_attempts',
  maxAttempts: 5,
  lockoutMs: 5 * 60 * 1000,
};

async function hashPin(pin) {
  const enc = new TextEncoder();
  let buf = enc.encode(PIN_CONFIG.salt + pin);
  for (let i = 0; i < PIN_CONFIG.iterations; i++) {
    buf = new Uint8Array(await crypto.subtle.digest('SHA-256', buf));
  }
  return Array.from(buf).map(b => b.toString(16).padStart(2, '0')).join('');
}

function safeEqual(a, b) {
  if (a.length !== b.length) return false;
  let diff = 0;
  for (let i = 0; i < a.length; i++) diff |= a.charCodeAt(i) ^ b.charCodeAt(i);
  return diff === 0;
}

function getAttempts() {
  try { return JSON.parse(localStorage.getItem(PIN_CONFIG.attemptKey)) || { count: 0, lockedUntil: 0 }; }
  catch { return { count: 0, lockedUntil: 0 }; }
}
function setAttempts(a) { localStorage.setItem(PIN_CONFIG.attemptKey, JSON.stringify(a)); }
function clearAttempts() { localStorage.removeItem(PIN_CONFIG.attemptKey); }

function isPinAuthorized() {
  try { return localStorage.getItem(PIN_CONFIG.storageKey) === PIN_CONFIG.hash; }
  catch { return false; }
}

function showPinModal() {
  document.getElementById('pinModal').classList.remove('hidden');
  checkLockout();
  setTimeout(() => document.getElementById('pinInput').focus(), 100);
}
function hidePinModal() {
  document.getElementById('pinModal').classList.add('hidden');
}

function checkLockout() {
  const a = getAttempts();
  const now = Date.now();
  const input = document.getElementById('pinInput');
  const btn = document.getElementById('pinSubmitBtn');
  const err = document.getElementById('pinError');
  if (a.lockedUntil > now) {
    const remain = Math.ceil((a.lockedUntil - now) / 1000);
    const m = Math.floor(remain / 60), s = remain % 60;
    input.disabled = true; btn.disabled = true; btn.style.opacity = '.5';
    err.textContent = `試行回数超過。${m}分${s.toString().padStart(2,'0')}秒後に再試行できます`;
    setTimeout(checkLockout, 1000);
    return true;
  }
  input.disabled = false; btn.disabled = false; btn.style.opacity = '';
  return false;
}

function handlePinKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); submitPin(); }
}
function handlePinInput() {
  const input = document.getElementById('pinInput');
  input.value = input.value.replace(/[^0-9]/g, '');
  document.getElementById('pinError').textContent = '';
  if (input.value.length === 4) submitPin();
}

async function submitPin() {
  if (checkLockout()) return;
  const input = document.getElementById('pinInput');
  const err = document.getElementById('pinError');
  const btn = document.getElementById('pinSubmitBtn');
  const pin = input.value.trim();
  if (pin.length !== 4) { err.textContent = '4桁のPINコードを入力してください'; return; }
  btn.disabled = true; btn.textContent = '認証中…';
  try {
    const h = await hashPin(pin);
    if (safeEqual(h, PIN_CONFIG.hash)) {
      localStorage.setItem(PIN_CONFIG.storageKey, PIN_CONFIG.hash);
      clearAttempts();
      hidePinModal();
    } else {
      const a = getAttempts();
      a.count = (a.count || 0) + 1;
      const remaining = PIN_CONFIG.maxAttempts - a.count;
      if (a.count >= PIN_CONFIG.maxAttempts) {
        a.lockedUntil = Date.now() + PIN_CONFIG.lockoutMs;
        a.count = 0;
      }
      setAttempts(a);
      input.classList.add('shake');
      setTimeout(() => input.classList.remove('shake'), 400);
      input.value = '';
      err.textContent = remaining > 0
        ? `PINコードが違います（残り${remaining}回）`
        : '試行回数を超えました。しばらくお待ちください';
      checkLockout();
    }
  } finally {
    btn.disabled = false; btn.textContent = '認証する';
  }
}

(function initPinAuth() {
  if (isPinAuthorized()) {
    document.getElementById('pinModal').classList.add('hidden');
  } else {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', showPinModal);
    } else {
      showPinModal();
    }
  }
})();

const SYSTEM_PROMPT = `あなたは「MEOコンシェルジュ」です。
店舗オーナーのLINEの相棒として、Google ビジネスプロフィール（GBP）の管理を全面的にサポートします。

担当店舗: 焼肉 大将（焼肉店）

## できること
- 口コミ返信の生成・投稿
- GBP投稿の提案・公開
- 集客データ（インサイト）の分析
- 写真のGBPへのアップロード（カテゴリ: FOOD/INTERIOR/EXTERIOR/TEAM）

ユーザーがAI画像生成を依頼したら:

2. generate_ai_image ツールを呼ぶ（英語プロンプトで詳細に記述）

ユーザーが写真を送ってきたら:

2. 行動を促す：提案後は「承認しますか？」「投稿しましょうか？」と次のアクションを明示
3. 感情を汲む：苦情口コミは特に丁寧に扱う
4. ツールを使う：情報が必要な場合は必ずツールを呼び出す

async function callClaude(userMessage, imageBase64, imageMime) {
  let userContent;
  if (imageBase64) {
    userContent = [
      { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageBase64 } },
      { type: 'text', text: userMessage || '写真を送りました。GBPに追加してください。' }
    ];
  } else {
    userContent = userMessage;
  }
  conversationHistory.push({ role: 'user', content: userContent });

  const toolsCalled = [];
  let messages = [...conversationHistory];

  for (let round = 0; round < 6; round++) {
    const res = await fetch(CLAUDE_PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1024, system: SYSTEM_PROMPT, tools: TOOLS, messages }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || 'API Error ' + res.status);
    }
    const data = await res.json();
    if (data.stop_reason === 'end_turn') {
      const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
      conversationHistory.push({ role: 'assistant', content: text });
      return { text, toolsCalled };
    }
    if (data.stop_reason === 'tool_use') {
      messages.push({ role: 'assistant', content: data.content });
      const results = [];
      for (const block of data.content) {
        if (block.type !== 'tool_use') continue;
        toolsCalled.push(block.name);
        if (APPROVAL_REQUIRED.has(block.name)) {
          showApprovalCard(block);
          const approved = await new Promise(resolve => { pendingApprovalResolve = resolve; });
          if (!approved) {
            results.push({ type: 'tool_result', tool_use_id: block.id, content: JSON.stringify({ cancelled: true, message: 'ユーザーがキャンセルしました。実行しないでください。' }) });
            continue;
          }
        }
        const toolResult = await executeTool(block.name, block.input||{});
        if (block.name === 'generate_ai_image' && lastGeneratedImageB64) {
          const imgEl = document.getElementById('messages');
          const wrap = document.createElement('div');
          wrap.className = 'msg bot';
          const imgId = 'ai-img-actions-' + Date.now();
          wrap.innerHTML = `<div class="msg-avatar">${BOT_AVATAR_SVG}</div><div class="bubble-wrap"><div class="bubble" style="padding:8px;"><img src="data:image/webp;base64,${lastGeneratedImageB64}" style="max-width:100%;border-radius:10px;display:block;margin-bottom:8px;"><div class="ai-image-actions" id="${imgId}"><button class="ai-image-action-btn" onclick="useGeneratedImage('photo','${imgId}')">📸 写真としてアップ</button><button class="ai-image-action-btn" onclick="useGeneratedImage('post','${imgId}')">📝 投稿として公開</button></div></div><div class="timestamp">${nowStr()}</div></div>`;
          imgEl.appendChild(wrap);
          imgEl.scrollTop = imgEl.scrollHeight;
          lastGeneratedImageB64 = null;
        }
        results.push({ type: 'tool_result', tool_use_id: block.id, content: JSON.stringify(toolResult) });
      }
      messages.push({ role: 'user', content: results });
      continue;
    }
    break;
  }
  throw new Error('エージェントループが最大回数を超えました');
}

// ============================================================
// UI
// ============================================================
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function nowStr() { return new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }); }

const BOT_AVATAR_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="12" rx="3"/><circle cx="9" cy="14" r="1.5" fill="white" stroke="none"/><circle cx="15" cy="14" r="1.5" fill="white" stroke="none"/><path d="M8 8V6a4 4 0 0 1 8 0v2"/><line x1="12" y1="3" x2="12" y2="4"/></svg>';

function addMessage(role, text, toolsCalled, imageDataUrl) {
  const el = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const TOOL_LABELS = {
    get_gbp_stats: '📊 データ取得',
    get_unanswered_reviews: '📬 口コミ取得',
    reply_to_review: '✍️ 口コミ返信',
    create_gbp_post: '📝 投稿公開',
    get_posts_history: '📋 投稿履歴取得',
    generate_post_draft: '💡 投稿案作成',
    generate_review_reply: '💬 返信文生成',
    upload_photo_to_gbp: '📸 写真アップロード',
    get_store_info: '🏪 店舗情報取得',
    update_store_info: '✏️ 店舗情報更新',
    get_keyword_rankings: '📍 キーワード順位取得',
    get_monthly_report: '📋 月次レポート生成',
    generate_ai_image: '🎨 AI画像生成',
  };
  const chipsHtml = (toolsCalled && toolsCalled.length)
    ? '<div class="tool-chips">' + toolsCalled.map(t => '<span class="tool-chip">' + (TOOL_LABELS[t] || t) + '</span>').join('') + '</div>' : '';
  const imgHtml = imageDataUrl ? '<img src="' + imageDataUrl + '" class="photo-preview" alt="送信した写真">' : '';
  if (role === 'bot') {
    wrap.innerHTML = '<div class="msg-avatar">' + BOT_AVATAR_SVG + '</div><div class="bubble-wrap"><div class="bubble">' + esc(text) + '</div>' + chipsHtml + '<div class="timestamp">' + nowStr() + '</div></div>';
  } else {
    const textHtml = text ? esc(text) : '';
    wrap.innerHTML = '<div class="bubble-wrap"><div class="bubble">' + imgHtml + textHtml + '</div><div class="timestamp">' + nowStr() + '</div></div>';
  }
  el.appendChild(wrap);
  el.scrollTop = el.scrollHeight;
  return wrap;
}

function addLoading() {
  const el = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot loading';
  wrap.innerHTML = '<div class="msg-avatar">' + BOT_AVATAR_SVG + '</div><div class="bubble-wrap"><div class="bubble">入力中…</div></div>';
  el.appendChild(wrap);
  el.scrollTop = el.scrollHeight;
  return wrap;
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  const hasPhoto = pendingPhotoBase64 !== null;
  if (!text && !hasPhoto) return;

  const sendBtn = document.getElementById('sendBtn');
  input.value = ''; autoResize(input);
  sendBtn.disabled = true;

  const photoUrl = hasPhoto ? 'data:' + pendingPhotoMime + ';base64,' + pendingPhotoBase64 : null;
  addMessage('user', text, null, photoUrl);

  const b64 = pendingPhotoBase64;
  const mime = pendingPhotoMime;
  pendingPhotoBase64 = null;
  pendingPhotoMime = null;

  const loading = addLoading();
  try {
    const result = await callClaude(text || null, b64, mime);
    loading.remove();
    if (result) addMessage('bot', result.text, result.toolsCalled);
  } catch (e) {
    loading.remove();
    addMessage('bot', 'エラー: ' + e.message);
  }
  sendBtn.disabled = false;
  input.focus();
}

// ============================================================
// 基本設定
// ============================================================
let appSettings = JSON.parse(localStorage.getItem('meo_settings') || '{"storeName":"焼肉 大将","storeId":"","keywords":["焼肉 渋谷","焼肉 個室 渋谷","和牛 渋谷"],"locations":[{"name":"渋谷駅前","address":"東京都渋谷区道玄坂1丁目"}]}');

function openSettings() {
  document.getElementById('sStoreName').value = appSettings.storeName || '';
  document.getElementById('sStoreId').value = appSettings.storeId || '';
  renderKeywords();
  renderLocations();
  document.getElementById('settingsPanel').classList.add('open');
}
function closeSettings() { document.getElementById('settingsPanel').classList.remove('open'); }

function renderKeywords() {
  const el = document.getElementById('keywordList');
  el.innerHTML = appSettings.keywords.map((kw, i) =>
    `<span class="keyword-tag">${esc(kw)}<button onclick="removeKeyword(${i})">×</button></span>`
  ).join('');
}
function addKeyword() {
  const input = document.getElementById('newKeyword');
  const kw = input.value.trim();
  if (!kw) return;
  appSettings.keywords.push(kw);
  input.value = '';
  renderKeywords();
}
function removeKeyword(i) { appSettings.keywords.splice(i, 1); renderKeywords(); }

function renderLocations() {
  const el = document.getElementById('locationList');
  el.innerHTML = appSettings.locations.map((loc, i) => `
    <div class="location-entry">
      <div class="location-fields">
        <input class="settings-input" placeholder="地点名（例：渋谷駅前）" value="${esc(loc.name)}" oninput="appSettings.locations[${i}].name=this.value">
        <input class="settings-input" placeholder="住所・エリア" value="${esc(loc.address)}" oninput="appSettings.locations[${i}].address=this.value">
      </div>
      <button class="location-remove" onclick="removeLocation(${i})">×</button>
    </div>`).join('');
}
function addLocation() { appSettings.locations.push({ name: '', address: '' }); renderLocations(); }
function removeLocation(i) { appSettings.locations.splice(i, 1); renderLocations(); }

function saveSettings() {
  appSettings.storeName = document.getElementById('sStoreName').value.trim();
  appSettings.storeId = document.getElementById('sStoreId').value.trim();
  localStorage.setItem('meo_settings', JSON.stringify(appSettings));
  closeSettings();
  addMessage('bot', `✅ 設定を保存しました！\n\nキーワード：${appSettings.keywords.join('、')}\n計測地点：${appSettings.locations.map(l=>l.name).join('、')}`);
}

// ============================================================
// 写真ソース選択
// ============================================================
function openPhotoSourceSheet() { document.getElementById('photoSourceSheet').classList.add('open'); }
function closePhotoSheet(e) {
  if (!e || e.target === document.getElementById('photoSourceSheet')) {
    document.getElementById('photoSourceSheet').classList.remove('open');
  }
}
function closePhotoSheetAndDo(mode) {
  document.getElementById('photoSourceSheet').classList.remove('open');
  if (mode === 'ai') {
    sendQuick('AI画像を生成して投稿したい');
  } else if (mode === 'library') {
    document.getElementById('photoFileInput').click();
  } else if (mode === 'camera') {
    document.getElementById('cameraFileInput').click();
  }
}

// ============================================================
// 投稿案タイプ選択
// ============================================================
function openPostTypeSheet() { document.getElementById('postTypeSheet').classList.add('open'); }
function closePostSheet(e) {
  if (!e || e.target === document.getElementById('postTypeSheet')) {
    document.getElementById('postTypeSheet').classList.remove('open');
  }
}
function closePostSheetAndDo(mode) {
  document.getElementById('postTypeSheet').classList.remove('open');
  if (mode === 'text') {
    sendQuick('投稿案を3つ作って');
  } else if (mode === 'image') {
    sendQuick('AI画像も一緒に投稿案を作って。画像を生成してから投稿文を考えて');
  }
}

// ============================================================
// 苦情対応モーダル
// ============================================================
function openComplaintModal() { document.getElementById('complaintOverlay').classList.add('open'); }
function closeComplaintModal(e) {
  if (!e || e.target === document.getElementById('complaintOverlay')) {
    document.getElementById('complaintOverlay').classList.remove('open');
    document.getElementById('complaintText').value = '';
    document.querySelectorAll('.style-chip').forEach(c => c.classList.remove('selected'));
  }
}
function toggleStyle(el) { el.classList.toggle('selected'); }
function submitComplaint() {
  const text = document.getElementById('complaintText').value.trim();
  if (!text) { alert('口コミの内容を入力してください'); return; }
  const styles = [...document.querySelectorAll('.style-chip.selected')].map(c => c.textContent);
  const styleStr = styles.length ? `対応スタイル：${styles.join('・')}。` : '';
  const msg = `以下の苦情口コミへの返信文を作って。${styleStr}\n\n口コミ内容：\n${text}`;
  closeComplaintModal();
  sendQuick(msg);
}

function sendQuick(text) { document.getElementById('msgInput').value = text; sendMessage(); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 96) + 'px'; }

function triggerPhotoUpload() { document.getElementById('photoFileInput').click(); }
function handlePhotoSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  const reader = new FileReader();
  reader.onload = function(e) {
    const dataUrl = e.target.result;
    pendingPhotoBase64 = dataUrl.split(',')[1];
    pendingPhotoMime = file.type || 'image/jpeg';
    sendMessage();
  };
  reader.readAsDataURL(file);
}

async function useGeneratedImage(mode, actionsId) {
  const actionsEl = document.getElementById(actionsId);
  if (!actionsEl) return;
  actionsEl.querySelectorAll('button').forEach(b => b.disabled = true);
  actionsEl.innerHTML = '<span style="font-size:12px;color:var(--text-mid)">処理中…</span>';

  const needsPost = mode === 'post' || mode === 'both';
  const needsPhoto = mode === 'photo' || mode === 'both';

  // 投稿案を生成
  let postText = 'AI生成画像を使った投稿です。';
  if (needsPost) {
    const draft = await executeTool('generate_post_draft', { theme: 'AI生成画像', count: 1 });
    if (draft.drafts?.[0]) postText = draft.drafts[0];
  }

  actionsEl.remove();

  // 写真アップロード
  if (needsPhoto) {
    const photoBlock = { name: 'upload_photo_to_gbp', input: { category: 'FOOD', caption: 'AI生成画像' } };
    showApprovalCard(photoBlock);
    const approved = await new Promise(r => { pendingApprovalResolve = r; });
    if (approved) {
      const result = await executeTool('upload_photo_to_gbp', { category: 'FOOD', caption: 'AI生成画像' });
      addMessage('bot', result.success ? '✅ ' + result.message : '❌ ' + (result.error || 'エラー'));
    }
  }

  // 投稿公開
  if (needsPost) {
    const postBlock = { name: 'create_gbp_post', input: { text: postText } };
    showApprovalCard(postBlock);
    const approved = await new Promise(r => { pendingApprovalResolve = r; });
    if (approved) {
      const result = await executeTool('create_gbp_post', { text: postText });
      addMessage('bot', result.success ? '✅ ' + result.message : '❌ ' + (result.error || 'エラー'));
    }
  }
}

function updateReviewBadge() {
  const count = reviews.filter(r => !r.replied).length;
  const badge = document.getElementById('reviewBadge');
  const badgeB = document.getElementById('reviewBadgeB');
  if (count > 0) {
    badge.textContent = count; badge.style.display = '';
    badgeB.textContent = count; badgeB.style.display = '';
  } else {
    badge.style.display = 'none';
    badgeB.style.display = 'none';
  }
}

let currentDesign = localStorage.getItem('meo_design') || 'A';
function setDesign(d) {
  currentDesign = d;
  localStorage.setItem('meo_design', d);
  const a = document.getElementById('quickBtns');
  const b = document.getElementById('quickBtnsB');
  const tA = document.getElementById('toggleA');
  const tB = document.getElementById('toggleB');
  if (d === 'A') {
    a.classList.remove('hidden');
    b.classList.remove('visible');
    tA.classList.add('active');
    tB.classList.remove('active');
  } else {
    a.classList.add('hidden');
    b.classList.add('visible');
    tB.classList.add('active');
    tA.classList.remove('active');
  }
}

function showWelcome() {
  addMessage('bot', 'こんにちは！MEOコンシェルジュです😊\n店舗「焼肉 大将」のGBP管理をサポートします。\n\n口コミ返信・投稿作成・データ確認など、何でもお気軽にどうぞ！\n\n📸 写真を送るとGBPの写真フォルダに追加できます。\n✏️ 住所・営業時間などの店舗情報変更もここで完結します。\n\n💡 下のボタンからよく使う機能をすぐに試せます。');
}

  });
});
