<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBP コンシェルジュ — デモ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: #e8eff5;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
}

/* ---- モーダル（APIキー入力）---- */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.55);
  display: flex; justify-content: center; align-items: center; z-index: 100;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: white; border-radius: 16px; padding: 32px 28px;
  width: 90%; max-width: 400px; box-shadow: 0 8px 40px rgba(0,0,0,.2);
}
.modal h2 { font-size: 18px; margin-bottom: 8px; }
.modal p { font-size: 13px; color: #666; margin-bottom: 20px; line-height: 1.6; }
.modal input {
  width: 100%; padding: 10px 14px; border: 1px solid #ddd;
  border-radius: 8px; font-size: 14px; margin-bottom: 12px; outline: none;
}
.modal input:focus { border-color: #06c755; }
.modal button {
  width: 100%; padding: 12px; background: #06c755; color: white;
  border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
  cursor: pointer;
}
.modal button:hover { background: #05b84c; }
.modal .note {
  font-size: 11px; color: #999; margin-top: 10px; text-align: center;
}

/* ---- チャット画面 ---- */
.container {
  width: 100%; max-width: 480px; height: 100svh;
  display: flex; flex-direction: column; background: #fff;
  box-shadow: 0 0 30px rgba(0,0,0,.15);
}

.header {
  background: #06c755; color: white;
  padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header h1 { font-size: 15px; font-weight: 700; }
.header .sub { font-size: 11px; opacity: .8; margin-top: 1px; }
.header-badge {
  background: rgba(255,255,255,.25); border-radius: 6px;
  padding: 2px 8px; font-size: 11px;
}
.header-btn {
  background: none; border: none; color: white; cursor: pointer;
  font-size: 18px; padding: 4px; opacity: .8;
}
.header-btn:hover { opacity: 1; }

.messages {
  flex: 1; overflow-y: auto; padding: 14px 12px;
  display: flex; flex-direction: column; gap: 10px;
  background: #e8eff5;
}

.msg { display: flex; gap: 8px; align-items: flex-end; }
.msg.user { flex-direction: row-reverse; }

.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: #06c755; display: flex; align-items: center;
  justify-content: center; font-size: 17px; flex-shrink: 0;
}

.bubble-wrap { display: flex; flex-direction: column; max-width: 78%; }
.msg.user .bubble-wrap { align-items: flex-end; }

.bubble {
  padding: 9px 13px; border-radius: 16px;
  line-height: 1.65; font-size: 14px;
  white-space: pre-wrap; word-break: break-word;
}
.msg.bot .bubble {
  background: white; border-bottom-left-radius: 4px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.msg.user .bubble {
  background: #06c755; color: white; border-bottom-right-radius: 4px;
}
.msg.loading .bubble { color: #aaa; font-style: italic; }

.tool-chips {
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;
}
.tool-chip {
  font-size: 10px; background: #f0f9f3; color: #06c755;
  border: 1px solid #cceedd; border-radius: 10px; padding: 1px 7px;
}

.timestamp {
  font-size: 10px; color: #aaa; margin-top: 3px; padding: 0 2px;
}

.quick-btns-wrap {
  position: relative; background: white; border-top: 1px solid #eee;
  display: flex; align-items: center;
}
.quick-btns {
  flex: 1; padding: 8px 8px 8px 12px;
  display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
}
.quick-btns::-webkit-scrollbar { display: none; }
.quick-scroll-btn {
  flex-shrink: 0; width: 28px; height: 28px; margin-right: 6px;
  background: white; border: 1.5px solid #ddd; border-radius: 50%;
  font-size: 14px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; color: #666;
  transition: border-color .15s, color .15s;
}
.quick-scroll-btn:hover { border-color: #06c755; color: #06c755; }
.quick-btn {
  white-space: nowrap; padding: 6px 13px;
  border: 1.5px solid #06c755; color: #06c755;
  border-radius: 16px; font-size: 12px; cursor: pointer;
  background: white; flex-shrink: 0; transition: background .15s;
}
.quick-btn:hover { background: #f0fff5; }

.input-area {
  padding: 10px 12px 12px; background: white;
  display: flex; align-items: center; gap: 8px;
}
.input-area textarea {
  flex: 1; padding: 9px 14px;
  border: 1.5px solid #ddd; border-radius: 20px;
  font-size: 14px; outline: none; resize: none;
  max-height: 100px; line-height: 1.5;
  font-family: inherit;
}
.input-area textarea:focus { border-color: #06c755; }
.send-btn {
  background: #06c755; color: white; border: none;
  border-radius: 50%; width: 40px; height: 40px;
  font-size: 17px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.send-btn:disabled { background: #ccc; cursor: default; }
.send-btn:not(:disabled):hover { background: #05b84c; }

.date-divider {
  text-align: center; font-size: 11px; color: #999;
  background: rgba(0,0,0,.06); border-radius: 10px;
  padding: 3px 10px; align-self: center;
}
</style>

<body>

<!-- APIキー入力モーダル -->
<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <h2>🔑 Anthropic APIキーを入力</h2>
    <p>このデモはブラウザから直接 Claude API を呼び出します。<br>
       APIキーはお使いのブラウザにのみ保存され、外部には送信されません。</p>

<!-- チャット画面 -->
<div class="container">
  <div class="header">
    <div class="header-left">
      <div>
        <div class="header h1" style="font-size:15px;font-weight:700;">🤖 GBPコンシェルジュ</div>
        <div class="sub" style="font-size:11px;opacity:.8;margin-top:1px;">焼肉 大将</div>
      </div>
      <span class="header-badge">DEMO</span>

  </div>

      <button class="quick-btn" onclick="sendQuick('未返信の口コミを見せて')">📬 未返信口コミ</button>
      <button class="quick-btn" onclick="sendQuick('最近の投稿状況は？')">📝 投稿状況</button>
      <button class="quick-btn" onclick="sendQuick('先月のアクセスデータを教えて')">📊 データ確認</button>
      <button class="quick-btn" onclick="sendQuick('投稿案を3つ作って')">✍️ 投稿案</button>
      <button class="quick-btn" onclick="sendQuick('写真の状況は？')">📸 写真確認</button>
      <button class="quick-btn" onclick="sendQuick('苦情口コミへの返信文を作って')">⚠️ 苦情対応</button>

<script>
// ============================================================
// モックデータ
// ============================================================
const STORE = {
  name: '焼肉 大将',
  category: '焼肉店',
  location_id: 'locations/mock-001',
};

const MOCK_REVIEWS = [
  { id: 'review-001', reviewer: '田中 太郎', stars: 5,
    comment: 'お肉が柔らかくてとても美味しかったです！スタッフの方も親切で、また来ます。', replied: false },
  { id: 'review-002', reviewer: '佐藤 花子', stars: 4,
    comment: 'コスパが良く満足しています。少し煙が気になりました。', replied: false },
  { id: 'review-003', reviewer: '山田 次郎', stars: 2,
    comment: '注文してから30分以上待たされました。改善をお願いします。', replied: false },
];
let reviews = MOCK_REVIEWS.map(r => ({...r}));

const MOCK_POSTS = [
  { id: 'post-001', text: '【週末限定】黒毛和牛カルビが10%オフ！この機会をお見逃しなく🔥',
    date: daysAgo(35), status: 'published' },
];
let posts = MOCK_POSTS.map(p => ({...p}));

function daysAgo(n) {
  const d = new Date(); d.setDate(d.getDate() - n);
  return d.toISOString().slice(0,10);
}

// ============================================================
// Tool 定義
// ============================================================
const TOOLS = [
  {
    name: 'get_gbp_stats',
    description: 'GBPの集客データ（検索表示数・クリック数・写真閲覧数など）を取得します。',
    input_schema: { type: 'object', properties: {}, required: [] },
  },
  {
    name: 'get_unanswered_reviews',
    description: '未返信の口コミ一覧を取得します。',
    input_schema: { type: 'object', properties: {}, required: [] },
  },
  {
    name: 'reply_to_review',
    description: '指定した口コミにオーナー返信を投稿します。',
    input_schema: {
      type: 'object',
      properties: {
        review_id: { type: 'string', description: '返信する口コミのID' },
        reply_text: { type: 'string', description: '返信文' },
      },
      required: ['review_id', 'reply_text'],
    },
  },
  {
    name: 'create_gbp_post',
    description: 'GBPに投稿を作成・公開します。',
    input_schema: {
      type: 'object',
      properties: {
        text: { type: 'string', description: '投稿テキスト' },
        cta_type: { type: 'string', description: 'CTAボタン種別' },
        cta_url: { type: 'string', description: 'CTAリンクURL' },
      },
      required: ['text'],
    },
  },
  {
    name: 'get_posts_history',
    description: '過去のGBP投稿一覧と最終投稿日を取得します。',
    input_schema: {
      type: 'object',
      properties: { limit: { type: 'integer' } },
      required: [],
    },
  },
  {
    name: 'generate_post_draft',
    description: '業種・季節・テーマに合わせたGBP投稿案を複数生成します。',
    input_schema: {
      type: 'object',
      properties: {
        theme: { type: 'string', description: '投稿テーマ' },
        count: { type: 'integer', description: '生成する案の数（デフォルト3）' },
      },
      required: [],
    },
  },
  {
    name: 'generate_review_reply',
    description: '口コミ内容に基づいた返信文を生成します。',
    input_schema: {
      type: 'object',
      properties: {
        review_id: { type: 'string', description: '対象口コミID' },
      },
      required: ['review_id'],
    },
  },
  {
    name: 'upload_photo_to_gbp',
    description: '写真をGBPに追加します。',
    input_schema: {
      type: 'object',
      properties: {
        category: { type: 'string', description: '写真カテゴリ（FOOD/INTERIOR/EXTERIOR/TEAM）' },
      },
      required: [],
    },
  },
];

// ============================================================
// Tool 実行
// ============================================================
function executeTool(name, input) {
  if (name === 'get_gbp_stats') {
    return {
      period: '直近30日',
      search_impressions: 1240, map_impressions: 830,
      website_clicks: 95, direction_requests: 42,
      phone_calls: 18, photo_views: 3200,
    };
  }

  if (name === 'get_unanswered_reviews') {
    const pending = reviews.filter(r => !r.replied);
    return pending.map(r => ({
      review_id: r.id, reviewer: r.reviewer,
      stars: r.stars, comment: r.comment,
    }));
  }

  if (name === 'reply_to_review') {
    const r = reviews.find(r => r.id === input.review_id);
    if (!r) return { success: false, error: '口コミが見つかりません' };
    r.replied = true; r.reply_text = input.reply_text;
    return { success: true, review_id: input.review_id,
             message: '返信を投稿しました（モック）' };
  }

  if (name === 'create_gbp_post') {
    const newPost = {
      id: `post-${String(posts.length + 1).padStart(3,'0')}`,
      text: input.text, date: new Date().toISOString().slice(0,10),
      status: 'published',
    };
    posts.push(newPost);
    return { success: true, post_id: newPost.id,
             message: '投稿を公開しました（モック）',
             text_preview: input.text.slice(0, 60) };
  }

  if (name === 'get_posts_history') {
    const limit = input.limit || 10;
    const sorted = [...posts].sort((a,b) => b.date.localeCompare(a.date));
    const lastDate = sorted[0]?.date;
    const daysSince = lastDate
      ? Math.floor((Date.now() - new Date(lastDate)) / 86400000) : null;
    return {
      posts: sorted.slice(0, limit).map(p => ({
        post_id: p.id,
        text: p.text.length > 80 ? p.text.slice(0,80) + '...' : p.text,
        published_at: p.date, status: p.status,
      })),
      total: posts.length,
      last_post_at: lastDate || null,
      days_since_last_post: daysSince,
    };
  }

  if (name === 'generate_post_draft') {
    const theme = input.theme || 'お店の魅力';
    const count = input.count || 3;
    const drafts = [
      `【${theme}】焼肉 大将では、黒毛和牛をリーズナブルにご提供しています🐄 ご家族・ご友人との特別なひとときに、ぜひお越しください！`,
      `🔥 ${theme}キャンペーン開催中！期間限定でドリンク1杯無料サービス中。詳しくはお店にお問い合わせください。`,
      `✨ 焼肉 大将からのお知らせ：${theme}にぴったりのコースをご用意しました。ご予約はお電話またはWeb予約で承ります。`,
      `🌟 ${theme}の季節になりました。当店自慢の熟成肉とともに、素敵なひとときをお過ごしください。スタッフ一同お待ちしております！`,
    ];
    return { drafts: drafts.slice(0, count), theme };
  }

  if (name === 'generate_review_reply') {
    const r = reviews.find(r => r.id === input.review_id);
    if (!r) return { error: '口コミが見つかりません' };
    let reply;
    if (r.stars >= 4) {
      reply = `この度は温かいご口コミをいただき、誠にありがとうございます！${r.reviewer}様にまたお越しいただけることを、スタッフ一同心よりお待ちしております🙏`;
    } else if (r.stars <= 2) {
      reply = `この度はご不満をおかけし、大変申し訳ございませんでした。${r.reviewer}様のご意見を真摯に受け止め、改善に努めてまいります。またの機会にぜひお試しいただけますと幸いです。`;
    } else {
      reply = `ご来店いただき、誠にありがとうございます。${r.reviewer}様のご意見はスタッフ一同の励みとなっております。またのお越しを心よりお待ちしております。`;
    }
    return { review_id: input.review_id, suggested_reply: reply };
  }

  if (name === 'upload_photo_to_gbp') {
    return {
      success: true,
      photo_id: `photo-${Date.now()}`,
      message: '写真をGBPにアップロードしました（モック）',
      category: input.category || 'FOOD',
    };
  }

  return { error: `未知のツール: ${name}` };
}

// ============================================================
// Claude API 呼び出し（Tool Calling ループ）
// ============================================================
const SYSTEM_PROMPT = `あなたは「GBPコンシェルジュ」です。
店舗オーナーのLINEの相棒として、Google ビジネスプロフィール（GBP）の管理を全面的にサポートします。

担当店舗: 焼肉 大将（焼肉店）

## 行動原則
1. 短く・具体的に：LINEで読むことを意識して返答は簡潔に
2. 行動を促す：提案後は「承認しますか？」「投稿しましょうか？」と次のアクションを明示
3. 感情を汲む：苦情口コミは特に丁寧に扱う
4. ツールを使う：情報が必要な場合は必ずツールを呼び出す

## 返答スタイル
- 絵文字を適度に使って親しみやすく
- 口コミ返信文・投稿案は「」で囲んで提示する
- 選択肢がある場合は番号リストで提示する`;

let conversationHistory = [];

async function callClaude(userMessage) {
  const apiKey = localStorage.getItem('anthropic_api_key');
  if (!apiKey) { showApiModal(); return null; }

  conversationHistory.push({ role: 'user', content: userMessage });

  const toolsCalled = [];
  let messages = [...conversationHistory];

  for (let round = 0; round < 5; round++) {
    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1024,
      system: SYSTEM_PROMPT,
      tools: TOOLS,
      messages,
    };

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) {
        localStorage.removeItem('anthropic_api_key');
        showApiModal();
        throw new Error('APIキーが無効です。再入力してください。');
      }
      throw new Error(err.error?.message || `API Error ${res.status}`);
    }

    const data = await res.json();

    // end_turn → テキストを返す
    if (data.stop_reason === 'end_turn') {
      const text = data.content
        .filter(b => b.type === 'text')
        .map(b => b.text).join('\n').trim();
      conversationHistory.push({ role: 'assistant', content: text });
      return { text, toolsCalled };
    }

    // tool_use → ツールを実行
    if (data.stop_reason === 'tool_use') {
      messages.push({ role: 'assistant', content: data.content });

      const toolResults = [];
      for (const block of data.content) {
        if (block.type !== 'tool_use') continue;
        toolsCalled.push(block.name);
        const result = executeTool(block.name, block.input || {});
        toolResults.push({
          type: 'tool_result',
          tool_use_id: block.id,
          content: JSON.stringify(result),
        });
      }
      messages.push({ role: 'user', content: toolResults });
      continue;
    }

    break;
  }

  throw new Error('エージェントループが最大回数を超えました');
}

// ============================================================
// UI ヘルパー
// ============================================================
function now() {
  return new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
}

function addMessage(role, text, toolsCalled) {
  const el = document.getElementById('messages');

  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const escapedText = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  const chipsHtml = (toolsCalled && toolsCalled.length)
    ? `<div class="tool-chips">${toolsCalled.map(t =>
        `<span class="tool-chip">🔧 ${t}</span>`).join('')}</div>`
    : '';

  if (role === 'bot') {
    wrap.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble-wrap">
        <div class="bubble">${escapedText}</div>
        ${chipsHtml}
        <div class="timestamp">${now()}</div>
      </div>`;
  } else {
    wrap.innerHTML = `
      <div class="bubble-wrap">
        <div class="bubble">${escapedText}</div>
        <div class="timestamp">${now()}</div>
      </div>`;
  }

  el.appendChild(wrap);
  el.scrollTop = el.scrollHeight;
  return wrap;
}

function addLoading() {
  const el = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot loading';
  wrap.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble-wrap">
      <div class="bubble">入力中…</div>
    </div>`;
  el.appendChild(wrap);
  el.scrollTop = el.scrollHeight;
  return wrap;
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  const sendBtn = document.getElementById('sendBtn');
  input.value = ''; autoResize(input);
  sendBtn.disabled = true;

  addMessage('user', text);
  const loading = addLoading();

  try {
    const result = await callClaude(text);
    loading.remove();
    if (result) addMessage('bot', result.text, result.toolsCalled);
  } catch (e) {
    loading.remove();
    addMessage('bot', `❌ エラー: ${e.message}`);
  }

  sendBtn.disabled = false;
  input.focus();
}

function scrollQuickBtns() {
  const el = document.getElementById('quickBtns');
  el.scrollBy({ left: 160, behavior: 'smooth' });
}

function sendQuick(text) {
  document.getElementById('msgInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault(); sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ============================================================
// APIキー管理
// ============================================================
function showApiModal() {
  document.getElementById('apiModal').classList.remove('hidden');
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('sk-ant-')) {
    alert('正しいAnthropicのAPIキーを入力してください（sk-ant- で始まるもの）');
    return;
  }
  localStorage.setItem('anthropic_api_key', key);
  document.getElementById('apiModal').classList.add('hidden');
  showWelcome();
}

function clearApiKey() {
  if (confirm('APIキーをリセットしますか？')) {
    localStorage.removeItem('anthropic_api_key');
    showApiModal();
  }
}

// ============================================================
// 起動
// ============================================================
function showWelcome() {
  addMessage('bot',
    `こんにちは！GBPコンシェルジュです😊\n` +
    `店舗「焼肉 大将」のGBP管理をサポートします。\n\n` +
    `口コミ返信・投稿作成・データ確認など、何でもお気軽にどうぞ！\n\n` +
    `💡 下のボタンからよく使う機能をすぐに試せます。`
  );
}

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('quickBtns').addEventListener('wheel', e => {
    if (e.deltaY !== 0) { e.preventDefault(); e.currentTarget.scrollLeft += e.deltaY; }
  }, { passive: false });
  const key = localStorage.getItem('anthropic_api_key');
  if (key) {
    showWelcome();
  } else {
    showApiModal();
  }
});
</script>
